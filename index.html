pen.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can help a participant recognize whether their deal has reached I3 - where a specific stakeholder personally feels the consequences of doing nothing - and coach the next action if it has not.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">C<\u002Fspan><span class=\"name\">Champion<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can facilitate the Coach vs. Champion distinction and use the Champion testing framework (access, intelligence, criteria, commitment tests) to help participants assess their own deals.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can explain how the Champion's role evolves across early (identify and educate), mid (test and activate), and late (sustain and protect) stages of the deal cycle.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can explain the org chart vs. power chart distinction and help a rep identify a stronger Champion candidate when their current contact is clearly a coach.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">C<\u002Fspan><span class=\"name\">Competition<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can facilitate a competitive discussion that covers all three types (named, unknown, status quo) and connects status quo losses to specific MEDDICC root causes.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can explain the competitor's Champion concept - why whoever has more internal influence typically wins - and coach a participant on how to identify and counter a competitor's internal advocate.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can help a participant identify what is actually driving a late-stage competitive threat and design a specific coaching response - not just \"get a lower price.\"<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <footer class=\"page-foot\"><span>Self-Assessment · Mode 01<\u002Fspan><span class=\"pagenum\">15<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SELF ASSESSMENT MODES 2 + 3 -->\n  <section class=\"page\" data-screen-label=\"Self-assessment - Modes 2 and 3\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 05 · Self-Assessment<\u002Fspan><\u002Fheader>\n    <h2 style=\"margin-top:0;\">Mode 2 - Gap Diagnosis<\u002Fh2>\n    <p>For each signal below, score your confidence that you could identify the MEDDICC letter(s) it points to and design an appropriate intervention. <b>1<\u002Fb> = I would not know where to start. <b>5<\u002Fb> = I could name the root cause and design the intervention.<\u002Fp>\n    <div class=\"signal-table\">\n      <div class=\"s-head\"><div>Signal you might see in the data<\u002Fdiv><div>MEDDICC root cause<\u002Fdiv><div style=\"text-align:center;\">Rate<\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Deals pushing 2+ times from committed<\u002Fdiv><div>Decision Process - no shared MAP; close date is seller aspiration, not customer-agreed timeline<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">High discovery-stage loss rate with \"went dark\" as top reason<\u002Fdiv><div>Pain at I1 only - urgency not escalated to I2/I3; EB has not personally felt the consequences of doing nothing<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Late-stage losses with no clear competitive signal<\u002Fdiv><div>Competitor's Champion had more organizational influence than ours - not a product problem, a people problem<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Deals closing but implementation not starting within 6 months<\u002Fdiv><div>No M2 validated by EB; no Go-Live Plan at handoff; no tested Champion to drive adoption post-signature<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Partner deals stalling after initial momentum<\u002Fdiv><div>Decision Process two-layer problem - partner's internal process unmapped; Champion is partner rep, not end-customer advocate<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Metrics confirmed by Champion but EB engagement is passive<\u002Fdiv><div>Metrics stuck at M2 without EB validation - Champion has the numbers, EB does not personally own them<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Inconsistent deal review quality across managers<\u002Fdiv><div>Not a MEDDICC letter gap - an evidence standard gap; intervention is coaching calibration, not content refresh<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2>Mode 3 - Live Operating Rhythm<\u002Fh2>\n    <p>For each context below, score your confidence that you could show up usefully - naming the qualification gap, framing the observation for the Sales Leader, and connecting it to an Enablement response.<\u002Fp>\n    <div class=\"signal-table\">\n      <div class=\"s-head\"><div>Operating rhythm context<\u002Fdiv><div>Can I show up usefully here?<\u002Fdiv><div style=\"text-align:center;\">Rate<\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Deal review<\u002Fdiv><div>I can identify which MEDDICC letters are weak, distinguish M1 from M2 Metrics, and help the leader understand what skill gap that reveals.<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">Forecast call<\u002Fdiv><div>I can identify where qualification assumptions are driving commit decisions - specifically whether a MAP exists and whether the EB has validated the M2 business case.<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">QBR<\u002Fdiv><div>I can read a loss pattern across the quarter, name the MEDDICC root cause (including I1/I2/I3 pain level and competitor's Champion dynamics), and design a targeted intervention.<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"s-row\"><div class=\"signal\">1:1 coaching session (observed)<\u002Fdiv><div>I can tell the difference between a leader coaching with evidence and one accepting rep self-reporting - and use that observation to design the next reinforcement session.<\u002Fdiv><div class=\"scale-cell\"><span class=\"scale-mini\"><span class=\"d\">1<\u002Fspan><span class=\"d\">2<\u002Fspan><span class=\"d\">3<\u002Fspan><span class=\"d\">4<\u002Fspan><span class=\"d\">5<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pull\"><p>Review your scores across all three modes. The London onsite will test all three - you will co-facilitate in Day 3 scenarios, diagnose signals in cross-functional simulations, and show up in live operating rhythm role-plays alongside Sales Leaders.<\u002Fp><\u002Fdiv>\n\n    <footer class=\"page-foot\"><span>Self-Assessment · Modes 02 + 03<\u002Fspan><span class=\"pagenum\">16<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- CLOSING -->\n  <section class=\"closing-page\" data-screen-label=\"Closing note\">\n    <header class=\"page-head\">\n      <span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan>\n      <span>A Note on What This Program is Building<\u002Fspan>\n    <\u002Fheader>\n    <div style=\"position:relative;z-index:2;max-width:760px;\">\n      <div class=\"eyebrow\">In closing<\u002Fdiv>\n      <h1>The reason MEDDICC has not held at EDB before is not a content problem. It is an ownership problem.<\u002Fh1>\n      <p>MEDDICC has been introduced at EDB before. It has been used in pockets, faded, and is now being reactivated. One function tried to drive adoption alone. This time, ownership is distributed across Sales Leadership, Sales Effectiveness, and RevOps - with clear responsibilities for each.<\u002Fp>\n      <p>As an Enablement practitioner, your role in that ownership model is specific. You are not responsible for MEDDICC adoption alone - Sales Leaders inspect and coach, RevOps builds and signals. But you are responsible for the depth that lets you facilitate, diagnose, and show up in live operating rhythm with the same authority a senior peer would.<\u002Fp>\n      <p style=\"font-family:var(--font-display);font-weight:500;font-size:22px;line-height:1.35;color:#fff;margin-top:28px;\">London will be the most concentrated preparation for that role you will get before taking full ownership. Arrive ready to use it.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"close-foot\">\n      <span>Prepared by Revlogic · Ashley Weston &amp; Kristen Glover · June 2026<\u002Fspan>\n      <span>Confidential · Internal<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv><!-- /.doc -->\n\n<script>\n// Auto-assign IDs from data-screen-label\nconst _idMap = {\n  'Cover':'cover','How to use this guide':'foreword','Why MEDDICC':'why-meddicc',\n  'Section 1 divider':'s01','Section 1 body':'s01-body',\n  'Section 2 divider':'s02',\n  'M - Metrics':'letter-m','E - Economic Buyer':'letter-e',\n  'D - Decision Criteria':'letter-d1','D - Decision Process':'letter-d2',\n  'I - Identified Pain':'letter-i','C - Champion':'letter-c1','C - Competition':'letter-c2',\n  'Section 3 divider':'s03','Section 3 - pillars and chain':'s03-pillars',\n  'Section 3 - stage scenarios':'s03-scenarios',\n  'Section 4 divider':'s04','Section 4 - Track 1 sales stages':'s04-track1',\n  'Section 4 - Track 2 operating cadence':'s04-track2',\n  'Section 5 divider':'s05','Self-assessment - Mode 1':'s05-mode1',\n  'Self-assessment - Modes 2 and 3':'s05-modes23','Closing note':'closing'\n};\ndocument.querySelectorAll('[data-screen-label]').forEach(el => {\n  const id = _idMap[el.dataset.screenLabel];\n  if (id && !el.id) el.id = id;\n});\n\n// Sidebar toggle (mobile)\nconst _sidebar = document.getElementById('sidebar');\nconst _toggle  = document.getElementById('sb-toggle');\nif (_toggle) _toggle.addEventListener('click', () => _sidebar.classList.toggle('open'));\n\n// Close sidebar when clicking outside (mobile)\ndocument.addEventListener('click', e => {\n  if (_sidebar && _sidebar.classList.contains('open') && !_sidebar.contains(e.target) && e.target !== _toggle) {\n    _sidebar.classList.remove('open');\n  }\n});\n\n// Active link tracking via IntersectionObserver\nconst _links = document.querySelectorAll('.sb-link[href^=\"#\"]');\nconst _obs = new IntersectionObserver(entries => {\n  entries.forEach(entry => {\n    if (entry.isIntersecting) {\n      _links.forEach(a => a.classList.remove('active'));\n      const link = document.querySelector('.sb-link[href=\"#' + entry.target.id + '\"]');\n      if (link) link.classList.add('active');\n    }\n  });\n}, { rootMargin: '0px 0px -65% 0px', threshold: 0.05 });\n\ndocument.querySelectorAll('[data-screen-label]').forEach(el => {\n  if (el.id) _obs.observe(el);\n});\n\n// Smooth scroll on nav click + immediate active state\n_links.forEach(a => {\n  a.addEventListener('click', e => {\n    e.preventDefault();\n    const target = document.querySelector(a.getAttribute('href'));\n    if (target) {\n      target.scrollIntoView({ behavior: 'smooth', block: 'start' });\n      _links.forEach(l => l.classList.remove('active'));\n      a.classList.add('active');\n    }\n    if (window.innerWidth <= 1100 && _sidebar) _sidebar.classList.remove('open');\n  });\n});\n\n// Restore hash on load\nif (location.hash) {\n  const el = document.querySelector(location.hash);\n  if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);\n}\n\n// ===== PILLAR COLOR SYSTEM =====\n// Assign pillar classes to letter sections so CSS can vary eyebrow + badge colours\nconst _pillarSections = {\n  'letter-m': 'p-value',  'letter-i': 'p-value',\n  'letter-e': 'p-people', 'letter-c1': 'p-people',\n  'letter-d1': 'p-process', 'letter-d2': 'p-process', 'letter-c2': 'p-process'\n};\nObject.entries(_pillarSections).forEach(([id, cls]) => {\n  const el = document.getElementById(id);\n  if (el) el.classList.add(cls);\n});\n\n// Dynamically colour glyphs in coaching table, rate blocks, stage rows\nconst _grad = {\n  value:   'linear-gradient(135deg, #00825E 0%, #67FFD5 100%)',\n  people:  'linear-gradient(135deg, #E76F4C 0%, #F5C5B7 100%)',\n  process: 'linear-gradient(135deg, #14758B 0%, #84DAED 100%)',\n};\nfunction _pillarOf(letter, name) {\n  const l = letter.trim();\n  const n = (name || '').toLowerCase();\n  if (l === 'M' || l === 'I') return 'value';\n  if (l === 'E')              return 'people';\n  if (l === 'C')              return n.includes('champion') ? 'people' : 'process';\n  return 'process'; // D, D\n}\ndocument.querySelectorAll(\n  '.coaching .glyph, .rate-block .glyph, .sr-letter .glyph'\n).forEach(g => {\n  const nameEl = g.parentElement.querySelector('.name');\n  const grad = _grad[_pillarOf(g.textContent, nameEl ? nameEl.textContent : '')];\n  Object.assign(g.style, {\n    backgroundImage: grad,\n    webkitBackgroundClip: 'text',\n    backgroundClip: 'text',\n    webkitTextFillColor: 'transparent',\n    color: 'transparent',\n  });\n});\n<\u002Fscript>\n\n\n<style id=\"__om-edit-overrides\">\n#s01-body :is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) >font { color: rgb(35, 42, 44) !important }\n#s01-body b >:is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) { color: rgb(35, 42, 44) !important }\n#s01-body >ul >:is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) >:is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) { font-weight: 600 !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
  </script>
