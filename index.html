the post-sales handoff significantly cleaner.<\u002Fp>\n    <h2>Common pitfalls to avoid<\u002Fh2>\n    <ul class=\"list\">\n      <li><strong>Assuming a standard process:<\u002Fstrong> Every organization's decision-making process is unique. Avoid the trap of thinking one size fits all.<\u002Fli>\n      <li><strong>Neglecting internal politics:<\u002Fstrong> Internal dynamics can significantly impact the Decision Process. Stay attuned to political nuances your Champion surfaces.<\u002Fli>\n      <li><strong>Focusing only on your Champion:<\u002Fstrong> While Champions are crucial, ensure you understand the entire Decision Process - not just your Champion's part in it.<\u002Fli>\n      <li><strong>Ignoring change management:<\u002Fstrong> Large purchases often require significant organizational change. Factor this into your understanding of the prospect's process.<\u002Fli>\n    <\u002Ful>\n    <h2>The two-layer problem in channel deals<\u002Fh2>\n    <p>In partner-led deals, there is a second layer of process that is almost always unmapped: the partner's own internal decision process - their margin assessment, resource allocation, and forecast commitment. A seller who has mapped the end-customer's process but not the partner's process is carrying hidden forecast risk.<\u002Fp>\n    <h2>Decision Process across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>Process focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Ask how decisions like this have been made before. Understand who is involved and what has caused similar projects to stall.<\u002Fdiv><div>You know the informal decision track, not just the formal one. Potential veto points identified early.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Build the MAP collaboratively with your Champion. Confirm the EB's role in each approval step. Identify procurement, legal, or committee requirements.<\u002Fdiv><div>A shared MAP exists and the customer has agreed to the steps and owners on their side. No hidden approval requirements remain.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>MAP is mapped to the day, not the week. Every remaining step has a named owner and timeframe. Go-Live Plan is drafted for post-sales handoff.<\u002Fdiv><div>Committed deals do not push. When external events cause delays, they are visible in advance - not surprises at forecast call.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"at-edb\" style=\"background-color: rgb(20, 117, 139)\">\n      <div class=\"badge\">At EDB · Decision Process<\u002Fdiv>\n      <h4>Decision Process at EDB<\u002Fh4>\n      <p>The most common Decision Process failure at EDB is committed deals pushing two or more times - forecasted on seller expectation of close, not on a verified MAP the customer has agreed to. The two-layer channel problem is endemic: the partner's own internal process (margin assessment, resource allocation, forecast commitment) runs in parallel with the end-customer's process and is almost always unmapped.<\u002Fp>\n      <p>In EMEA enterprise markets, Decision Process is particularly layered - requiring legal review, data protection officer signoff, and works council notification that do not exist in US deals. Build these steps into every MAP for EMEA opportunities from the first discovery call.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · D · Decision Process<\u002Fspan><span class=\"pagenum\">07<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- I - IMPLICATE THE PAIN -->\n  <section class=\"letter-page\" data-screen-label=\"I - Identified Pain\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 02 · Letter 5 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark\">\n      <div class=\"glyph\">I<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 05 · Implicate the Pain<\u002Fdiv>\n        <h3 class=\"name\">Implicate the Pain<\u002Fh3>\n        <div class=\"descriptor\">Guide prospects through three escalating levels of pain - from surface symptom to personal urgency.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">To create real urgency, elite sellers guide prospects through three escalating levels of pain: Identify, Indicate, and Implicate. Progressing through these stages transforms a simple acknowledged problem into an urgent, high-priority mandate for your solution.<\u002Fp>\n\n    <!-- VISUAL: I1/I2/I3 unified with Technical vs EB pain -->\n    <div style=\"margin: 28px 0 32px; break-inside: avoid;\">\n      <div style=\"display: grid; grid-template-columns: 56px 1fr 1fr; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid rgba(5,130,95,0.3);\">\n        <div style=\"background: var(--edb-graphite); padding: 12px 10px; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-body); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 500;\">Level<\u002Fspan><\u002Fdiv>\n        <div style=\"background: var(--edb-graphite); padding: 12px 16px; border-left: 1px solid rgba(255,255,255,0.1);\"><span style=\"font-family: var(--font-body); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 500;\">Technical pain<\u002Fspan><\u002Fdiv>\n        <div style=\"background: var(--edb-graphite); padding: 12px 16px; border-left: 1px solid rgba(255,255,255,0.1);\"><span style=\"font-family: var(--font-body); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,0.55); font-weight: 500;\">EB-level pain<\u002Fspan><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.10); display: flex; align-items: center; justify-content: center; padding: 20px 10px; border-top: 1px solid rgba(5,130,95,0.2);\"><span style=\"font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #05825F;\">I1<\u002Fspan><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.05); border-top: 1px solid rgba(5,130,95,0.2); border-left: 1px solid rgba(5,130,95,0.2); padding: 16px 18px;\"><div style=\"font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--fg-1);\">Identify the Pain<\u002Fdiv><div style=\"font-size: 13px; color: var(--fg-3); margin-top: 5px; line-height: 1.5;\">\"The system is too slow.\" \"It takes 3 hours to run a report.\" Friction in daily operations felt by end users and technical team.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.05); border-top: 1px solid rgba(5,130,95,0.2); border-left: 1px solid rgba(5,130,95,0.2); padding: 16px 18px;\"><div style=\"font-size: 13px; color: var(--fg-3); line-height: 1.5; font-style: italic;\">EB not yet engaged. No business urgency. Most sellers stop here.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.22); display: flex; align-items: center; justify-content: center; padding: 20px 10px; border-top: 1px solid rgba(5,130,95,0.25);\"><span style=\"font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #05825F;\">I2<\u002Fspan><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.09); border-top: 1px solid rgba(5,130,95,0.25); border-left: 1px solid rgba(5,130,95,0.25); padding: 16px 18px;\"><div style=\"font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--fg-1);\">Indicate the Pain<\u002Fdiv><div style=\"font-size: 13px; color: var(--fg-3); margin-top: 5px; line-height: 1.5;\">Quantified operational impact: lost hours, wasted resources, cost of workarounds. The cost of inaction becomes real and specific.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.09); border-top: 1px solid rgba(5,130,95,0.25); border-left: 1px solid rgba(5,130,95,0.25); padding: 16px 18px;\"><div style=\"font-size: 13px; color: var(--fg-2); line-height: 1.5;\">\"We are losing $2M annually.\" \"We cannot hit our Q3 targets.\" Financial urgency begins. Champion now has ammunition.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.38); display: flex; align-items: center; justify-content: center; padding: 20px 10px; border-top: 1px solid rgba(5,130,95,0.35);\"><span style=\"font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #00825E;\">I3<\u002Fspan><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.15); border-top: 1px solid rgba(5,130,95,0.35); border-left: 1px solid rgba(5,130,95,0.35); padding: 16px 18px;\"><div style=\"font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--fg-1);\">Implicate the Pain<\u002Fdiv><div style=\"font-size: 13px; color: var(--fg-3); margin-top: 5px; line-height: 1.5;\">Personal consequences surface. Missed quotas, board pressure, stalled careers. Specific stakeholders feel what happens if nothing changes.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: rgba(5,130,95,0.15); border-top: 1px solid rgba(5,130,95,0.35); border-left: 1px solid rgba(5,130,95,0.35); padding: 16px 18px;\"><div style=\"font-size: 13px; color: var(--fg-1); line-height: 1.5; font-weight: 500;\">EB personally feels the consequence of doing nothing. Drives the decision from \"we should fix this\" to \"I must fix this now.\"<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 10px; padding: 10px 14px; background: rgba(5,130,95,0.08); border-left: 3px solid #05825F; border-radius: 0 8px 8px 0; font-size: 12.5px; color: var(--fg-2);\">Pain must escalate from technical friction (I1) to financial cost (I2) to personal consequence (I3) before it drives an EB decision<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"vs-table\">\n      <div class=\"vs-head left\">Technical-level pain<\u002Fdiv><div class=\"vs-head right\" style=\"background-color: rgb(0, 130, 94)\">EB-level pain<\u002Fdiv>\n      <div class=\"vs-row\"><div>Felt by the technical team and Champion<\u002Fdiv><div class=\"right\">Felt by the Economic Buyer as a business problem they own<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Language: \"The system is too slow\", \"It takes 3 hours to run a report\", \"We lack API integration\"<\u002Fdiv><div class=\"right\">Language: \"We are losing $2M annually in churn\", \"We cannot hit our Q3 growth targets\", \"Our compliance risk exposes us to lawsuits\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Solved by: features. Creates urgency for the Champion to advocate.<\u002Fdiv><div class=\"right\">Solved by: quantifiable ROI. Creates urgency for the EB to approve and drive adoption.<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Risk if only present: EB approves passively - deal closes but does not implement<\u002Fdiv><div class=\"right\">Risk if absent: no personal stake means no urgency to act or sustain adoption<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>Bridging technical pain to EB pain<\u002Fh2>\n    <p>To elevate a deal, you must translate Technical Pain into EB Pain using bridging questions:<\u002Fp>\n    <ul class=\"list\">\n      <li><strong>Quantify the technical pain:<\u002Fstrong> \"If it takes your team 3 hours to run that report, how much is that costing in wasted labor per week?\"<\u002Fli>\n      <li><strong>Implicate the business impact:<\u002Fstrong> \"If you don't solve this data bottleneck, how does that impact your team's ability to hit the upcoming revenue goals?\"<\u002Fli>\n      <li><strong>Escalate to the EB:<\u002Fstrong> Present validated financial implications directly to the Economic Buyer to ensure they understand the exact cost of doing nothing.<\u002Fli>\n    <\u002Ful>\n    <div class=\"at-edb\" style=\"background-color: rgb(0, 130, 94)\">\n      <div class=\"badge\">At EDB · Implicate the Pain<\u002Fdiv>\n      <h4>Pain at EDB<\u002Fh4>\n      <p>At EDB, pain identification is rarely the challenge - sellers can articulate the problem. The gap is implication. The coaching question that reveals whether a deal has real urgency: \"Has the Economic Buyer personally said they will sponsor a budget request to solve this problem - and what happens to their business if they do not?\"<\u002Fp>\n      <p>In regulated markets (financial services, government, healthcare), the primary pain driver is often compliance and regulatory risk rather than cost reduction. In APAC markets, the framing tends toward risk mitigation and strategic alignment. Knowing which pain narrative resonates in which market - and how to bridge it to EB-level urgency - is part of the facilitation depth.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · I · Implicate the Pain<\u002Fspan><span class=\"pagenum\">08<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- C - CHAMPION -->\n  <section class=\"letter-page\" data-screen-label=\"C - Champion\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 02 · Letter 6 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark warm\">\n      <div class=\"glyph\">C<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 06 · Champion<\u002Fdiv>\n        <h3 class=\"name\">Champion<\u002Fh3>\n        <div class=\"descriptor\">The person selling for you inside the customer organization - and the letter that fails most often.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">The single most common Champion failure is not losing a Champion mid-deal. It is never having one in the first place - because the seller mistook a <em>coach<\u002Fem> for a Champion and never looked further.<\u002Fp>\n    <h2>The org chart vs. the power chart<\u002Fh2>\n    <div class=\"vs-table\">\n      <div class=\"vs-head left\">Org Chart<\u002Fdiv><div class=\"vs-head right\" style=\"background-color: rgb(231, 111, 76)\">Power Chart<\u002Fdiv>\n      <div class=\"vs-row\"><div>Shows reporting lines and titles<\u002Fdiv><div class=\"right\">Shows who has real influence regardless of hierarchy<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Authority type: positional, based on role<\u002Fdiv><div class=\"right\">Authority type: informal, based on trust, expertise, relationships<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Useful for understanding formal structure<\u002Fdiv><div class=\"right\">Useful for identifying who actually shapes decisions<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Risk: you engage the wrong people and miss the real influencers<\u002Fdiv><div class=\"right\">The map that tells you where your Champion actually is<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>Coach vs. Champion - the critical distinction<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Capability<\u002Fdiv><div>Coach<\u002Fdiv><div>Champion<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Provides information about the account<\u002Fdiv><div>Yes<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Has organizational influence<\u002Fdiv><div>No<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Has access to the Economic Buyer<\u002Fdiv><div>No<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Will take internal risk on your behalf<\u002Fdiv><div>No<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Shapes decision criteria in your favor<\u002Fdiv><div>No<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Sells for you when you are not in the room<\u002Fdiv><div>No<\u002Fdiv><div>Yes<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>In any group meeting, the person asking the most penetrating business-level questions - not technical questions - is often your best Champion candidate. Champions look through the lens of business impact, not feature evaluation.<\u002Fp><\u002Fdiv>\n    <h2>Why someone becomes your Champion<\u002Fh2>\n    <p>Champions have personal aspirations, and they need to differentiate themselves inside their organization by solving a significant problem. Understanding what drives a person to champion your solution is as important as finding them. Personal wins take different forms: recognition, greater control, career advancement, team performance.<\u002Fp>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>A Champion who cannot answer \"what is in it for me\" will not sustain the internal effort that driving a deal requires. Your job is to make that answer obvious.<\u002Fp><\u002Fdiv>\n    <h2>Testing your Champion<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Test type<\u002Fdiv><div>Champion response<\u002Fdiv><div>Coach response<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Access test: Introduce me to the Economic Buyer<\u002Fdiv><div>Arranges the meeting and prepares the EB in advance<\u002Fdiv><div>Offers to pass along your contact details<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Intelligence test: What is the competition proposing?<\u002Fdiv><div>Tells you directly and helps you respond strategically<\u002Fdiv><div>Says they are not sure or cannot share<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Criteria test: Can you share the evaluation framework?<\u002Fdiv><div>Shares it and helps shape it in your favor<\u002Fdiv><div>Says they will try but nothing comes through<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Commitment test: Would you advocate for this internally?<\u002Fdiv><div>Engages directly and takes a visible position<\u002Fdiv><div>Expresses support but takes no visible action<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>Stealth Champions<\u002Fh2>\n    <p>Not every Champion will maintain an obvious relationship with your team. In organizations with formal procurement processes or political sensitivity around vendor relationships, Champions operate quietly - shaping criteria and influencing the EB without appearing to do so publicly. These situations are powerful but require the same evidence standard: what have they actually done?<\u002Fp>\n    <h2>Champion across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>Champion focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Identify potential Champions by watching who asks business-level questions, who has context beyond their immediate role, and who expresses urgency about the problem. Build credibility and educate before testing.<\u002Fdiv><div>You have a hypothesis about who your Champion is. They are engaged and curious. You have not yet asked them to take action on your behalf.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Formally test your Champion. Ask for something that requires effort or personal exposure - EB access, internal data, criteria input. Educate them on your differentiators so they can sell internally.<\u002Fdiv><div>Champion has passed at least one test. They are actively selling for you when you are not in the room. They can articulate your value case in their own language.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>Activate your Champion in every critical late-stage conversation - procurement, legal, finance, executive review. Ensure they have visibility into the CFO or approval-side conversations.<\u002Fdiv><div>Champion is present or informed in every step that can affect the deal. They are not a passive supporter - they are the internal driver of the decision.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"at-edb\" style=\"background-color: rgb(231, 111, 76)\">\n      <div class=\"badge\">At EDB · Champion<\u002Fdiv>\n      <h4>Champion at EDB<\u002Fh4>\n      <p>The most critical gap in MEDDICC application at EDB is Champion. No consistent standard exists for what a tested Champion looks like. The downstream consequence is concrete: deals close but are never implemented because there was no tested Champion to drive adoption post-signature.<\u002Fp>\n      <p>The coaching standard this program is building: a rep who says \"I have a Champion\" should be able to answer four questions without hesitation. Who is it? What have they done that proves they will take personal risk on your behalf? Do they have access to the Economic Buyer? What is their personal stake in the outcome?<\u002Fp>\n    <\u002Fdiv>\n<h2>Your competitor's Champion<\u002Fh2>\n    <p>Every competitive deal has a mirror dynamic: whoever has more internal influence usually wins. Your competitors are working to cultivate their own Champion inside your prospect's organization.<\u002Fp>\n\n    <!-- CHAMPION vs COMPETITOR'S CHAMPION MIRROR -->\n    <div style=\"margin: 20px 0 32px; break-inside: avoid;\">\n      <div style=\"display: grid; grid-template-columns: 1fr 1px 1fr; gap: 0; border-radius: 14px; overflow: hidden; border: 1px solid var(--border-1);\">\n\n        <!-- YOUR Champion -->\n        <div>\n          <div style=\"background: linear-gradient(135deg, #E76F4C 0%, #F89E5D 100%); padding: 14px 22px;\">\n            <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-bottom: 3px;\">Your side<\u002Fdiv>\n            <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 17px; color: #fff;\">Your Champion<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(0,130,94,0.15); color: #00825E; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">✓<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Advocates for your solution when you are not in the room<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(0,130,94,0.15); color: #00825E; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">✓<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Shapes Decision Criteria toward your differentiators<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(0,130,94,0.15); color: #00825E; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">✓<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Brokers Economic Buyer access and prepares the EB before meetings<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(0,130,94,0.15); color: #00825E; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">✓<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Calls you when competition makes a move - before it impacts the deal<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(0,130,94,0.15); color: #00825E; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">✓<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Has personal motivation - their outcome is tied to this deal succeeding<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Divider -->\n        <div style=\"background: var(--border-1);\"><\u002Fdiv>\n\n        <!-- Competitor's Champion -->\n        <div>\n          <div style=\"background: var(--edb-graphite); padding: 14px 22px;\">\n            <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 3px;\">Their side<\u002Fdiv>\n            <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 17px; color: #fff;\">Competitor's Champion<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(196,74,44,0.12); color: var(--danger); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">!<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Advocates for the competitor's solution in the same internal conversations<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(196,74,44,0.12); color: var(--danger); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">!<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Introduces criteria that favor the competitor - often before you know it has happened<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(196,74,44,0.12); color: var(--danger); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">!<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Blocks or delays your access to the Economic Buyer<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(196,74,44,0.12); color: var(--danger); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">!<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Signals: unexpected access barriers, sudden criteria shifts, EB conversations that go quiet<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n              <span style=\"width: 20px; height: 20px; border-radius: 999px; background: rgba(196,74,44,0.12); color: var(--danger); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 20px; margin-top: 1px;\">!<\u002Fspan>\n              <span style=\"font-size: 14px; color: var(--fg-2); line-height: 1.45;\">Has their own personal motivation - their credibility is tied to the competitor winning<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 10px; padding: 10px 14px; background: rgba(196,74,44,0.07); border-radius: 8px; font-size: 12.5px; color: var(--fg-2); text-align: center; border-left: 3px solid var(--danger);\">\n        <strong style=\"color: var(--fg-1);\">The response:<\u002Fstrong> Deepen your Champion's EB access and personal conviction before the competitor's advantage compounds.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n\n    <footer class=\"page-foot\"><span>Section 02 · C · Champion<\u002Fspan><span class=\"pagenum\">09<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- C - COMPETITION -->\n  <section class=\"letter-page\" data-screen-label=\"C - Competition\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 02 · Letter 7 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark deep\">\n      <div class=\"glyph\">C<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 07 · Competition<\u002Fdiv>\n        <h3 class=\"name\">Competition<\u002Fh3>\n        <div class=\"descriptor\">Who else is in the deal - and what does the customer believe about them.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">Competition in MEDDICC is not just about the named vendors you are competing against. Every deal has three distinct competitive dimensions - and sellers typically focus on only one.<\u002Fp>\n    <h2>Three types of competition<\u002Fh2>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>Competitive type<\u002Fdiv><div>What it is and why it matters<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Named competitors<\u002Fdiv><div>The vendors the customer is evaluating alongside you. Most visible and easiest to prepare for. Risk: over-focus on this category while ignoring the others.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Unknown competitors<\u002Fdiv><div>Vendors in the deal you do not know about. In complex enterprise deals, there are likely evaluation participants your contact has not mentioned. A Champion who cannot tell you who else is in the deal is not yet fully trusted.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>The status quo<\u002Fdiv><div>The customer's current approach - doing nothing, extending existing contracts, managing with workarounds. The most common competitive outcome and the most consistently underestimated.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>Losing to the status quo - the MEDDICC root causes<\u002Fh2>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>What appears to be the reason<\u002Fdiv><div style=\"color: rgb(20, 117, 139)\">The actual MEDDICC root cause<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>\"The timing was not right\"<\u002Fdiv><div>Identified Pain was never escalated to EB-owned - no felt urgency at the decision-making level<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>\"Budget constraints\"<\u002Fdiv><div>Metrics were not validated at the EB level - no personal conviction that the investment was justified<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>\"We need more time to evaluate\"<\u002Fdiv><div>Decision Process was never mapped - no Sequence of Events to drive a decision<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>\"Competing priorities\"<\u002Fdiv><div>Champion was a coach - no internal advocate driving the decision through organizational inertia<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>\"The solution was not ready\"<\u002Fdiv><div>Decision Criteria were not shaped - evaluation framework did not reflect actual requirements<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>Status quo wins are not neutral outcomes. They are usually the downstream result of qualification gaps that were present throughout the deal but were never surfaced or addressed.<\u002Fp><\u002Fdiv>\n    <h2 style=\"height: 0px\">\n<\u002Fh2>\n    <p style=\"height: 0px\">\n<\u002Fp>\n    <p style=\"height: 0px\">\n<\u002Fp>\n    <h2>Competition across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>Competition focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Identify who else is being evaluated - including unknown competitors and the status quo. Ask your Champion who else has been in the account and what they proposed.<\u002Fdiv><div>You know the competitive landscape before the formal evaluation begins. You are shaping criteria before competitors can.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Understand the customer's current perception of each competitor. Work through your Champion to shape internal perception of your differentiators. Watch for criteria shifts that suggest competitor influence.<\u002Fdiv><div>Your Champion is countering competitor narratives internally. Decision Criteria reflect your genuine strengths, not your competitor's.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>Watch for late-stage competitive moves: price concessions, executive relationship plays, reference offers targeted at procurement or the EB. Have a response prepared for each.<\u002Fdiv><div>No late-stage competitive move surprises you. Your Champion is informed and activated before you are. Your EB relationship is stronger than the competitor's.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"at-edb\" style=\"background-color: rgb(20, 117, 139)\">\n      <div class=\"badge\">At EDB · Competition<\u002Fdiv>\n      <h4>Competition at EDB<\u002Fh4>\n      <p>EDB's strongest competitive position is in Oracle replacement - the total cost of ownership narrative resonates with both technical evaluators and Economic Buyers, and migration tooling maturity is a genuine differentiator. PostgreSQL compatibility depth and enterprise support model are also strong evaluation dimensions when introduced early.<\u002Fp>\n      <p>The underdiagnosed competitive risk in partner-led deals is the partner's own commercial preferences. If a competing vendor offers better margin or strategic incentive, the partner's natural inclination shifts - and that shift does not appear in CRM until it is too late to respond. Map the partner's competitive alignment early and treat it as part of your competition qualification, not a separate track.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · C · Competition<\u002Fspan><span class=\"pagenum\">10<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 3 DIVIDER -->\n  <section class=\"divider\" data-screen-label=\"Section 3 divider\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 03 · MEDDICC as a Connected System<\u002Fspan><\u002Fheader>\n    <div class=\"chapter\">03<\u002Fdiv>\n    <div class=\"divider-body\">\n      <div class=\"eyebrow\">Section three<\u002Fdiv>\n      <h2 class=\"div-title\">The connected system - and where each letter fires.<\u002Fh2>\n      <p class=\"div-lede\">How the seven letters interlock across three pillars, what a deal looks like at every stage, and how each letter's activity changes through the sales cycle.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SECTION 3 BODY - PILLARS + CHAIN -->\n  <section class=\"page\" data-screen-label=\"Section 3 - pillars and chain\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 03 · MEDDICC as a Connected System<\u002Fspan><\u002Fheader>\n    <h1 class=\"section-num\">Section 03<\u002Fh1>\n    <h1 class=\"section-title\">MEDDICC as a Connected System<\u002Fh1>\n    <p class=\"lede\">The seven letters organize naturally into three interdependent pillars. Weakness in an earlier pillar cascades into every pillar that follows.<\u002Fp>\n    <h2>The three pillars<\u002Fh2>\n    <div class=\"pillars-grid\">\n      <div class=\"pillar\">\n        <div class=\"p-num\">PILLAR 1<\u002Fdiv>\n        <div class=\"p-title\">The Value Foundation<\u002Fdiv>\n        <div class=\"p-sub\">Why change?<\u002Fdiv>\n        <div class=\"p-items\">\n          <div class=\"p-item\"><div class=\"pi-name\">Identified Pain<\u002Fdiv><div class=\"pi-desc\">Discover the specific business problem and its true cost.<\u002Fdiv><\u002Fdiv>\n          <div class=\"p-item\"><div class=\"pi-name\">Metrics<\u002Fdiv><div class=\"pi-desc\">Pain must be quantified. Numbers that justify the investment.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"p-num\">PILLAR 2<\u002Fdiv>\n        <div class=\"p-title\">The People<\u002Fdiv>\n        <div class=\"p-sub\">Who drives the deal?<\u002Fdiv>\n        <div class=\"p-items\">\n          <div class=\"p-item\"><div class=\"pi-name\">Champion<\u002Fdiv><div class=\"pi-desc\">Needs the Metrics to sell internally. Without numbers, no ammunition.<\u002Fdiv><\u002Fdiv>\n          <div class=\"p-item\"><div class=\"pi-name\">Economic Buyer<\u002Fdiv><div class=\"pi-desc\">Champion coaches access to EB. EB confirms whether buying is a priority.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"p-num\">PILLAR 3<\u002Fdiv>\n        <div class=\"p-title\">The Process<\u002Fdiv>\n        <div class=\"p-sub\">How to win?<\u002Fdiv>\n        <div class=\"p-items\">\n          <div class=\"p-item\"><div class=\"pi-name\">Decision Criteria<\u002Fdiv><div class=\"pi-desc\">Champion helps shape criteria in your favor.<\u002Fdiv><\u002Fdiv>\n          <div class=\"p-item\"><div class=\"pi-name\">Decision Process<\u002Fdiv><div class=\"pi-desc\">The step-by-step roadmap to EB meeting and final approval.<\u002Fdiv><\u002Fdiv>\n          <div class=\"p-item\"><div class=\"pi-name\">Competition<\u002Fdiv><div class=\"pi-desc\">Affects every other letter - changes criteria, process, and Champion behavior.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      /* Visual: Deal Stage Activity Map */\n      .stage-map { margin: 24px 0 36px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border-1); break-inside: avoid; }\n      .stage-map .sm-header { display: grid; grid-template-columns: 160px repeat(3, 1fr); background: var(--edb-graphite); }\n      .stage-map .sm-header > div { padding: 12px 16px; font-family: var(--font-body); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; color: rgba(255,255,255,0.85); }\n      .stage-map .sm-header > div:first-child { color: rgba(255,255,255,0.5); }\n      .stage-map .sm-row { display: grid; grid-template-columns: 160px repeat(3, 1fr); border-top: 1px solid var(--border-1); }\n      .stage-map .sm-letter { padding: 14px 16px; background: var(--neutral-100); display: flex; align-items: center; gap: 10px; }\n      .stage-map .sm-letter .sg { font-family: var(--font-display); font-weight: 500; font-size: 22px; }\n      .stage-map .sm-letter .sn { font-family: var(--font-display); font-weight: 500; font-size: 13px; color: var(--fg-2); }\n      .stage-map .sm-cell { padding: 14px 16px; border-left: 1px solid var(--border-1); display: flex; align-items: center; }\n      .sm-bar-wrap { flex: 1; height: 8px; background: var(--neutral-200); border-radius: 4px; overflow: hidden; }\n      .sm-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }\n      .sm-label { font-size: 11px; color: var(--fg-3); margin-top: 4px; }\n      .sm-cell-inner { display: flex; flex-direction: column; gap: 4px; width: 100%; }\n    <\u002Fstyle>\n    <h2>When each letter is most active - deal stage activity map<\u002Fh2>\n    <div class=\"stage-map\">\n      <div class=\"sm-header\"><div>Letter<\u002Fdiv><div>Early stage<\u002Fdiv><div>Mid cycle<\u002Fdiv><div>Late stage<\u002Fdiv><\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#00825E,#67FFD5);-webkit-background-clip:text;background-clip:text;color:transparent\">I<\u002Fspan><span class=\"sn\">Pain<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">I1: Identify the Pain<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:80%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">I2/I3: Indicate &amp; Implicate<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:40%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Confirm EB ownership<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#00825E,#67FFD5);-webkit-background-clip:text;background-clip:text;color:transparent\">M<\u002Fspan><span class=\"sn\">Metrics<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:50%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">M1: Proof points<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:90%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">M2: Build with Champion<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:70%;background:linear-gradient(90deg,#00825E,#67FFD5)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">M2 EB-validated + M3 plan<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#E76F4C,#F5C5B7);-webkit-background-clip:text;background-clip:text;color:transparent\">C<\u002Fspan><span class=\"sn\">Champion<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:60%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Identify &amp; educate<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Test &amp; activate<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Sustain &amp; protect<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#E76F4C,#F5C5B7);-webkit-background-clip:text;background-clip:text;color:transparent\">E<\u002Fspan><span class=\"sn\">Econ. Buyer<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:30%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Identify, do not pitch<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:85%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">M2 validation + criteria<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#E76F4C,#F5C5B7)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Drive decision urgency<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#14758B,#84DAED);-webkit-background-clip:text;background-clip:text;color:transparent\">D<\u002Fspan><span class=\"sn\">Criteria<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:70%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Shape before RFP<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Lock criteria in your favor<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:40%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Defend &amp; respond<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#14758B,#84DAED);-webkit-background-clip:text;background-clip:text;color:transparent\">D<\u002Fspan><span class=\"sn\">Process<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:50%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Discover the 3 elements<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:80%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Build the MAP<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:95%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">MAP to the day + Go-Live<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sm-row\">\n        <div class=\"sm-letter\"><span class=\"sg\" style=\"background:linear-gradient(135deg,#14758B,#84DAED);-webkit-background-clip:text;background-clip:text;color:transparent\">C<\u002Fspan><span class=\"sn\">Competition<\u002Fspan><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:65%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Map competitive landscape<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:75%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Counter competitor's Champion<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sm-cell\"><div class=\"sm-cell-inner\"><div class=\"sm-bar-wrap\"><div class=\"sm-bar\" style=\"width:90%;background:linear-gradient(90deg,#14758B,#84DAED)\"><\u002Fdiv><\u002Fdiv><div class=\"sm-label\">Respond to late moves<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>If this letter fails...<\u002Fdiv><div>The downstream consequence<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Identified Pain<\u002Fdiv><div>No Metrics to justify the purchase. No urgency. No business case foundation.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Metrics<\u002Fdiv><div>Champion has no ammunition to sell internally. Cannot defend the investment to the EB.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Champion<\u002Fdiv><div>Cannot get genuine access to the Economic Buyer. EB meetings become cold calls.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Economic Buyer<\u002Fdiv><div>Deal stalls or reverses at approval stage. Budget approvals become fragile and easily displaced.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Decision Criteria<\u002Fdiv><div>Win the evaluation but lose the deal. A technically strong solution evaluated on competitor-shaped criteria.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Decision Process<\u002Fdiv><div>Close dates become guesses, lacking urgency or a compelling event to anchor towards. Committed deals push indefinitely with no accountability on either side.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 03 · System<\u002Fspan><span class=\"pagenum\">11<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 4 - TRACK 1 -->\n  <section class=\"page\" data-screen-label=\"Section 4 - Track 1 sales stages\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 04 · Track 1 - MEDDICC Across Sales Stages<\u002Fspan><\u002Fheader>\n    <h1 class=\"section-num\">Section 04 · Track 1<\u002Fh1>\n    <h1 class=\"section-title\" style=\"color: rgb(40, 73, 90);\">MEDDICC Across the Sales Stages<\u002Fh1>\n    <p class=\"lede\">MEDDICC is not a single discovery exercise at deal entry. The letters surface, evolve, and deepen as a deal moves from early engagement through close.<\u002Fp>\n    <h2>Early stage - establishing the foundation<\u002Fh2>\n    <p><b>Identified Pain<\u002Fb> should be your first and deepest investment. Ask broad business questions before narrowing to specific problems. Push to understand not just what the problem is but who it affects and how it connects to organizational priorities.<\u002Fp>\n    <p><b>Champion identification<\u002Fb> begins here even if not yet confirmed. Watch every interaction for the signals of influence - who asks business-level questions, who has context about organizational priorities, who expresses urgency that goes beyond their immediate role.<\u002Fp>\n    <p><b>Metrics groundwork<\u002Fb> also begins early. Ask the customer how they measure success in the areas your solution affects. The numbers they give you at this stage are not yet confirmed Metrics - but they are the raw material from which a Level 3 value case will eventually be built.<\u002Fp>\n    <h2>Mid cycle - building and testing<\u002Fh2>\n    <p>By mid cycle you should have a clear picture of Pain, a developing Metrics case, an identified or likely Economic Buyer, and a hypothesis about your Champion. Mid cycle is where qualification depth is built and tested.<\u002Fp>\n    <p>The <b>Metrics letter deepens<\u002Fb> from seller-estimated numbers to customer-validated figures. Use your Champion to get customer data - their actual cost numbers, their internal performance metrics, their language for the problem and the solution.<\u002Fp>\n    <p><b>Champion testing becomes active<\u002Fb> in mid cycle. You have built a working relationship and demonstrated value. Now you test: ask for something that requires effort or personal exposure. The response - whether they act, deflect, or delay - gives you real data.<\u002Fp>\n    <p><b>Decision Criteria shaping is urgent<\u002Fb> in mid cycle, particularly before any formal RFP is issued. Work with your Champion to understand the evaluation framework and influence it toward your genuine differentiators.<\u002Fp>\n    <h2>Late stage - confirming and closing<\u002Fh2>\n    <p>Late stage is where qualification weaknesses that were tolerable in mid cycle become deal-threatening. Every letter that was not fully confirmed in mid cycle now carries magnified risk.<\u002Fp>\n    <p><b>Metrics at late stage<\u002Fb> should be in confirmatory mode - you are not building the business case, you are defending it. Has the EB personally validated the numbers?<\u002Fp>\n    <p><b>Champion activation is critical.<\u002Fb> Your Champion needs to be present in or informed about every conversation that can affect the deal - legal, procurement, finance, executive review. A Champion who is not in the room when the CFO asks about the budget is not able to protect the deal.<\u002Fp>\n    <p><b>Competition at late stage<\u002Fb> often takes the form of a price move or an executive relationship play. A competitor who has been losing the technical evaluation may make a last-ditch effort to win on price with a stakeholder who was not engaged in the original evaluation.<\u002Fp>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>The Decision Process in late stage should be mapped to the day, not the week. Every remaining step needs an owner, a timeframe, and a dependency. Committed deals that push are almost always deals where the sequence of events was aspirational, not verified.<\u002Fp><\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 04 · Track 1<\u002Fspan><span class=\"pagenum\">13<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 4 DIVIDER -->\n  <section class=\"divider\" data-screen-label=\"Section 4 divider\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 04 · MEDDICC in Practice<\u002Fspan><\u002Fheader>\n    <div class=\"chapter\">04<\u002Fdiv>\n    <div class=\"divider-body\">\n      <div class=\"eyebrow\">Section four<\u002Fdiv>\n      <h2 class=\"div-title\">From inspection, to coaching - in the operating rhythm.<\u002Fh2>\n      <p class=\"div-lede\">How Enablement shows up in deal reviews, forecast calls, QBRs, and 1:1s - and what a real EDB deal looks like when you read it stage by stage.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SECTION 4 - TRACK 2 OPERATING CADENCE -->\n  <section class=\"page\" data-screen-label=\"Section 4 - Track 2 operating cadence\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 04 · Track 2 - Operating Cadence<\u002Fspan><\u002Fheader>\n    <h1 class=\"section-num\">Section 04 · Track 2<\u002Fh1>\n    <h1 class=\"section-title\">MEDDICC in the Operating Cadence<\u002Fh1>\n    <p class=\"lede\">Four contexts where Enablement practitioners are expected to show up alongside Sales Leaders. In each, your role is distinct from the Sales Leader's.<\u002Fp>\n\n    <div class=\"track-block\">\n      <div class=\"tb-title\"><span class=\"tb-num\">01<\u002Fspan>1:1 Coaching Sessions<\u002Fdiv>\n      <div class=\"track-compare\">\n        <div class=\"tc-col\"><div class=\"tc-head\">Without MEDDICC<\u002Fdiv><p>A 1:1 without a shared qualification standard is a status update. The manager asks how deals are going. The rep provides a narrative. No shared standard exists for what \"good\" looks like.<\u002Fp><\u002Fdiv>\n        <div class=\"tc-col active\"><div class=\"tc-head\">With MEDDICC<\u002Fdiv><p>A 1:1 with MEDDICC as the coaching language is a diagnostic conversation - one letter at a time, testing what the rep knows and how they know it. Not to check boxes, but to understand and coach.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Enablement's role<\u002Fdiv><p>You are not typically in 1:1 conversations. Your role is designing the coaching capability that makes those 1:1s work. When you observe a pattern of weak letter coaching across a team, that is a facilitation design signal.<\u002Fp><\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Signals it's working<\u002Fdiv><p>Deals surface as at-risk in 1:1s before they appear in deal reviews. Reps use MEDDICC language in their own analysis without prompting.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"track-block\">\n      <div class=\"tb-title\"><span class=\"tb-num\">02<\u002Fspan>Deal Reviews<\u002Fdiv>\n      <div class=\"track-compare\">\n        <div class=\"tc-col\"><div class=\"tc-head\">Without MEDDICC<\u002Fdiv><p>A deal review without a shared qualification standard is a narrative exercise. The rep tells the story of the deal. The manager probes. No quality gate exists between individual rep judgment and pipeline.<\u002Fp><\u002Fdiv>\n        <div class=\"tc-col active\"><div class=\"tc-head\">With MEDDICC<\u002Fdiv><p>A deal review with MEDDICC is a diagnostic exercise. The rep arrives with an analysis of each letter: what they know, what they do not, what they are doing to close gaps - not a story of the deal.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Enablement's role<\u002Fdiv><p>Observer and pattern recognizer. You are watching for the qualification gaps that the coaching conversation skips. When a rep names a \"Champion\" and no one asks what that person has done to prove it - that is your signal.<\u002Fp><\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Realistic scenario<\u002Fdiv><p>A rep presents a late-stage deal as committed. The manager asks about the Champion. The rep names a VP of Engineering who has been supportive in calls. No one asks what the VP has done to demonstrate they will take internal risk. After the deal review, you bring this to the Sales Leader: \"Across three deals today, Champions were named but never tested.\" That is Mode 2 diagnosis informing Mode 3 action.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"track-block\">\n      <div class=\"tb-title\"><span class=\"tb-num\">03<\u002Fspan>Forecast Calls<\u002Fdiv>\n      <div class=\"track-compare\">\n        <div class=\"tc-col\"><div class=\"tc-head\">Without MEDDICC<\u002Fdiv><p>A forecast call without a shared qualification standard is a confidence vote. Reps state expected close dates. The manager aggregates. There is no evidence standard for what \"commit\" means.<\u002Fp><\u002Fdiv>\n        <div class=\"tc-col active\"><div class=\"tc-head\">With MEDDICC<\u002Fdiv><p>A forecast call with MEDDICC is an evidence review. Deals in the commit category are expected to have a verified Sequence of Events - not a close date, but a step-by-step map the customer has agreed to.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Enablement's role<\u002Fdiv><p>Observer focused on the aggregated signal. You are watching for systemic qualification gaps, not individual deal quality. When three committed deals push in the same week citing different surface reasons, the actual root cause is often the same MEDDICC letter gap across all three.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"track-block\">\n      <div class=\"tb-title\"><span class=\"tb-num\">04<\u002Fspan>QBRs<\u002Fdiv>\n      <div class=\"track-compare\">\n        <div class=\"tc-col\"><div class=\"tc-head\">Without MEDDICC<\u002Fdiv><p>A QBR without a shared qualification framework is a performance retrospective. The team reviews wins and losses. Commitments about next quarter are made. No root cause analysis connects patterns to gaps.<\u002Fp><\u002Fdiv>\n        <div class=\"tc-col active\"><div class=\"tc-head\">With MEDDICC<\u002Fdiv><p>A QBR with MEDDICC is a diagnostic retrospective. Loss analysis is mapped against letters - not \"we lost on price\" but \"we lost because Champion testing was absent and the EB relationship was never established.\"<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tb-row\"><div class=\"trl\">Enablement's role<\u002Fdiv><p>The QBR is where your Mode 2 capability has the most direct application. You are translating a quarter's worth of signals into a coherent skill gap narrative and a forward-looking reinforcement plan. A realistic scenario: QBR reveals 60% of losses came from deals where EDB was selected as preferred vendor but then lost in procurement and legal - a Decision Process gap that was invisible during the evaluation. That is a design problem you own.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2>The coaching question bank<\u002Fh2>\n    <div class=\"coaching\">\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">M<\u002Fspan><span class=\"name\">Metrics<\u002Fspan><\u002Fdiv><div class=\"question\">Has the Economic Buyer personally validated these numbers? What did they say?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">E<\u002Fspan><span class=\"name\">Economic Buyer<\u002Fspan><\u002Fdiv><div class=\"question\">If I asked [EB name] right now what they think of our proposal, what would they say?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">D<\u002Fspan><span class=\"name\">Decision Criteria<\u002Fspan><\u002Fdiv><div class=\"question\">What criteria on their list are unfavorable to us, and what are you doing about it?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">D<\u002Fspan><span class=\"name\">Decision Process<\u002Fspan><\u002Fdiv><div class=\"question\">Walk me through every step between now and a signed contract - who owns each one?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">I<\u002Fspan><span class=\"name\">Identified Pain<\u002Fspan><\u002Fdiv><div class=\"question\">Does the Economic Buyer personally feel the urgency of this problem? What have they said?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">C<\u002Fspan><span class=\"name\">Champion<\u002Fspan><\u002Fdiv><div class=\"question\">What is the most recent thing your Champion did that proves they are selling for you?<\u002Fdiv><\u002Fdiv>\n      <div class=\"c-row\"><div class=\"letter-cell\"><span class=\"glyph\">C<\u002Fspan><span class=\"name\">Competition<\u002Fspan><\u002Fdiv><div class=\"question\">What does the customer currently believe about [competitor] that we need to change?<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 04 · Track 2<\u002Fspan><span class=\"pagenum\">14<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 3 - STAGE SCENARIOS -->\n  <section class=\"page\" data-screen-label=\"Section 3 - stage scenarios\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 03 · Stage-Based Scenarios<\u002Fspan><\u002Fheader>\n    <h2 style=\"margin-top:0;\">Reading a deal at every stage<\u002Fh2>\n    <p>The scenarios below show how MEDDICC letter patterns change through the lifecycle of a real EDB deal - an Oracle migration opportunity.<\u002Fp>\n\n    <div class=\"stage-block\">\n      <div class=\"stage-head\"><span class=\"s-label\">Early Stage<\u002Fspan><span class=\"s-ctx\">Two discovery calls with VP of Database Architecture. Oracle migration confirmed as interest. 90-day close date aspirational.<\u002Fspan><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">I<\u002Fdiv><div class=\"name\">Pain<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Confirmed at Level 1 with a technical sponsor. <div class=\"risk\">Urgency not established - EB has not been identified.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">M<\u002Fdiv><div class=\"name\">Metrics<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Seller-estimated from benchmarks only.\nBusiness case is entirely seller-generated.<\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">E<\u002Fdiv><div class=\"name\">Econ. Buyer<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Unknown - rep does not know who controls budget. <div class=\"risk\">All qualification built on a stakeholder with no budget authority.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">C<\u002Fdiv><div class=\"name\">Champion<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">VP of Database Architecture helpful and engaged but untested. <div class=\"risk\">May be a coach, not a Champion.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-summary\"><strong>What this deal needs:<\u002Fstrong> Develop Pain to Level 2, identify the Economic Buyer, and begin a Champion test by asking for something with personal exposure - an introduction, internal data, or access to organizational priorities.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stage-block\">\n      <div class=\"stage-head\"><span class=\"s-label\">Mid Cycle<\u002Fspan><span class=\"s-ctx\">45 days in. CTO introduced and has confirmed Oracle migration as strategic priority. $2.8M cost case built. RFP imminent.<\u002Fspan><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">I<\u002Fdiv><div class=\"name\">Pain<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Level 2 - pain implicated with CTO. But has the CFO confirmed this as a budget priority?\n&nbsp; EB-level pain confirmation still absent.<\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">M<\u002Fdiv><div class=\"name\">Metrics<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">CTO says numbers \"look compelling\" - not the same as EB-validated.\n&nbsp; Metrics not confirmed by the person who controls the budget.<\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">D<\u002Fdiv><div class=\"name\">Criteria<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">RFP not yet issued. This is the last window to shape criteria.\n&nbsp; If the rep does not act now, criteria will be set without their input.<\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">C<\u002Fdiv><div class=\"name\">Champion<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">VP made the CTO introduction - moving from coach toward Champion. Not formally tested.\nWillingness to take further internal risk unknown.<\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-summary\"><strong>What this deal needs:<\u002Fstrong> Use the pre-RFP window to shape Decision Criteria aggressively. Confirm whether the CTO is the true Economic Buyer or whether CFO approval is required. Complete a formal Champion test.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stage-block\">\n      <div class=\"stage-head\"><span class=\"s-label\">Late Stage<\u002Fspan><span class=\"s-ctx\">30 days to close. Selected as preferred vendor after RFP. Legal and procurement now involved. Competitor reportedly offering a significant discount.<\u002Fspan><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">E<\u002Fdiv><div class=\"name\">Econ. Buyer<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">CTO recommended EDB, but CFO is now involved in procurement. <div class=\"risk\">A late-stage approval requirement from a previously unknown stakeholder is the most dangerous deal risk.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">M<\u002Fdiv><div class=\"name\">Metrics<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Business case built with CTO. Has the CFO reviewed it? <div class=\"risk\">If procurement is challenging the price, there may be no EB-level Metrics validation to anchor the negotiation.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">C<\u002Fdiv><div class=\"name\">Champion<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">VP of Database Architecture does not have visibility into the CFO conversation. <div class=\"risk\">Champion is absent from the decision-making conversation that now matters most.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-row\"><div class=\"sr-letter\"><div class=\"glyph\">C<\u002Fdiv><div class=\"name\">Competition<\u002Fdiv><\u002Fdiv><div class=\"sr-content\">Competitor has reportedly offered a significant discount to procurement. <div class=\"risk\">A late price move is influencing a stakeholder who was not engaged in the original evaluation.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"stage-summary\"><strong>What this deal needs:<\u002Fstrong> Immediately clarify the EB situation - does the CFO have unilateral veto authority? Get a CTO-CFO joint meeting. Activate the Champion to get ahead of the procurement conversation before the competitor's discount is evaluated in isolation.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <footer class=\"page-foot\"><span>Section 03 · Stage Scenarios<\u002Fspan><span class=\"pagenum\">12<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 5 DIVIDER -->\n  <section class=\"divider\" data-screen-label=\"Section 5 divider\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 05 · Self-Assessment<\u002Fspan><\u002Fheader>\n    <div class=\"chapter\">05<\u002Fdiv>\n    <div class=\"divider-body\">\n      <div class=\"eyebrow\">Section five<\u002Fdiv>\n      <h2 class=\"div-title\">Score yourself. Honestly.<\u002Fh2>\n      <p class=\"div-lede\">Across all three modes - not just facilitation fluency. An accurate picture of where to invest in London is more valuable than a flattering one.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SELF ASSESSMENT MODE 1 -->\n  <section class=\"page\" data-screen-label=\"Self-assessment - Mode 1\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 05 · Self-Assessment<\u002Fspan><\u002Fheader>\n    <h1 class=\"section-num\">Section 05<\u002Fh1>\n    <h1 class=\"section-title\">Self-Assessment<\u002Fh1>\n    <p class=\"lede\">Rate yourself 1-5. <b>1<\u002Fb> = not confident doing this in a live situation with an experienced sales team. <b>5<\u002Fb> = can do this with depth, handle pushback, and help others do it too.<\u002Fp>\n    <h2 style=\"margin-top:24px;\">Mode 1 - Live Facilitation<\u002Fh2>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">M<\u002Fspan><span class=\"name\">Metrics<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can explain the M1/M2/M3 framework and help a participant identify which level their deal is at - and what it takes to move to the next.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can coach the distinction between Technical Metrics and Business Metrics and explain why selling on Technical Metrics alone creates deployment gap risk.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can explain the M2-to-M3 transition and help a participant see how their post-sales Metrics tracking strategy connects to renewal and expansion.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">E<\u002Fspan><span class=\"name\">Economic Buyer<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can facilitate the EB access vs. EB relationship distinction and explain the four EB question categories (Financial ROI, Risk, Strategic Alignment, Implementation).<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can coach EB engagement across early, mid, and late stages - and explain how the EB's role shifts from pain confirmation to criteria validation to decision driver.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can explain the \"blocked from the EB\" red flag and help a participant understand what it signals about their Champion's real level of organizational influence.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">D<\u002Fspan><span class=\"name\">Decision Criteria<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can explain the distinction between Metrics (quantifying value) and Decision Criteria (evaluation standards) and why they must be shaped in parallel - not sequentially.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can facilitate the distinction between documenting criteria and actively shaping them - with a concrete example of what shaping looks like at each stage of the deal.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can explain what late-stage criteria lock means, how to recognize competitor influence on criteria, and what the coaching response is when criteria shift unexpectedly.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">D<\u002Fspan><span class=\"name\">Decision Process<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can explain the three elements of Decision Process (The Process, The People, The Timing) and use a real deal from the room to map all three.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can introduce MAPs and Go-Live Plans as facilitation tools and explain why a MAP shared with the customer is more powerful than an internal Sequence of Events.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">03<\u002Fspan><span class=\"stmt\">I can walk through the common Decision Process pitfalls (assuming standard process, ignoring change management, focusing only on the Champion) and connect each to a real deal pattern.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rate-block\">\n      <div class=\"letter-head\"><span class=\"glyph\">I<\u002Fspan><span class=\"name\">Implicate the Pain<\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">01<\u002Fspan><span class=\"stmt\">I can facilitate the I1/I2/I3 framework (Identify, Indicate, Implicate) and use deal examples to make the progression from surface pain to personal urgency concrete.<\u002Fspan><span class=\"rate-scale\"><span class=\"dot\">1<\u002Fspan><span class=\"dot\">2<\u002Fspan><span class=\"dot\">3<\u002Fspan><span class=\"dot\">4<\u002Fspan><span class=\"dot\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"rate-item\"><span class=\"num\">02<\u002Fspan><span class=\"stmt\">I can explain the bridging process from Technical Pain to EB Pain - and coach a participant through the specific questions that make the translation hap
