  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec - re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

inverse:  var(--neutral-800);\n\n  --fg-1: var(--neutral-900);   /* primary text on light bg */\n  --fg-2: var(--neutral-700);   /* secondary */\n  --fg-3: var(--neutral-600);   /* tertiary / metadata */\n  --fg-on-dark:  #F4F1EC;\n  --fg-on-grad:  #FFFFFF;\n\n  --border-1: rgba(54, 65, 68, 0.12);\n  --border-2: rgba(54, 65, 68, 0.20);\n  --divider:  rgba(54, 65, 68, 0.08);\n\n  --accent:           var(--edb-rust);\n  --accent-hover:     #D7613F;   /* rust -8% L */\n  --accent-pressed:   #BE5435;\n  --accent-fg:        #FFFFFF;\n\n  --link:        var(--edb-aquamarine);\n  --link-hover:  var(--edb-blue-coal);\n\n  --success: var(--edb-juniper);\n  --warning: var(--edb-goldleaf);\n  --danger:  #C44A2C;             /* darker rust for accessible danger */\n  --info:    var(--edb-teal-for-fears);\n\n  --focus-ring: var(--edb-aquamarine);\n\n  /* =========================================================\n     COLOR - Gradients (from EDB Brand Guide, p. 6)\n     Angled top‑left → bottom‑right. Place light pole behind\n     the logo for light gradients; invert for dark.\n     ========================================================= */\n  --gradient-steel-blue:  linear-gradient(135deg, #83BBDD 0%, #19425B 100%);\n  --gradient-emerald:     linear-gradient(135deg, #84DAED 0%, #14758B 100%);\n  --gradient-goldenrod:   linear-gradient(135deg, #67FFD5 0%, #00825E 100%);\n  --gradient-sunset:      linear-gradient(135deg, #F5E8C3 0%, #E7C569 100%);\n  --gradient-heat:        linear-gradient(135deg, #FCD8BE 0%, #F89E5D 100%);\n  --gradient-soft-heat:   linear-gradient(135deg, #F5C5B7 0%, #E76F4C 100%);\n\n  /* Inverted (logo sits in dark corner) variants */\n  --gradient-steel-blue-inv:  linear-gradient(135deg, #19425B 0%, #83BBDD 100%);\n  --gradient-emerald-inv:     linear-gradient(135deg, #14758B 0%, #84DAED 100%);\n\n  /* Loop signature gradient - green into blue, used on hero discs */\n  --gradient-loop: conic-gradient(from 220deg at 50% 50%,\n                    #67FFD5 0deg, #05825F 60deg,\n                    #136A7F 160deg, #28495A 260deg,\n                    #83BBDD 320deg, #67FFD5 360deg);\n\n  /* =========================================================\n     TYPOGRAPHY - Families\n     ========================================================= */\n  --font-display: \"Neue Haas Grotesk Display Pro\",\n                  \"Helvetica Neue\", \"Helvetica\", \"Arial\",\n                  system-ui, sans-serif;\n  --font-body:    \"Roboto\",\n                  \"Helvetica Neue\", \"Helvetica\", \"Arial\",\n                  system-ui, sans-serif;\n  --font-mono:    \"Roboto Mono\", ui-monospace, \"SF Mono\",\n                  Menlo, Consolas, monospace;\n\n  /* Word spacing - from brand guide (min 70 / target 80 / max 100) */\n  --word-spacing-display: -0.01em;\n\n  /* =========================================================\n     TYPOGRAPHY - Scale\n     Display set in --font-display, weight 500 by default.\n     Body set in --font-body, weight 400.\n     ========================================================= */\n  --fs-display-1: clamp(48px, 6.5vw, 88px);\n  --fs-display-2: clamp(40px, 5vw,   64px);\n  --fs-h1: 48px;\n  --fs-h2: 36px;\n  --fs-h3: 28px;\n  --fs-h4: 22px;\n  --fs-h5: 18px;\n  --fs-h6: 16px;\n  --fs-body-lg: 18px;\n  --fs-body:    16px;\n  --fs-body-sm: 14px;\n  --fs-caption: 13px;\n  --fs-mono:    14px;\n  --fs-eyebrow: 12px;\n\n  --lh-tight: 1.08;\n  --lh-snug:  1.2;\n  --lh-base:  1.5;\n  --lh-loose: 1.65;\n\n  --tracking-tight: -0.02em;\n  --tracking-snug:  -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow: 0.14em;\n\n  /* =========================================================\n     SPACING (8px base; 4px micro)\n     ========================================================= */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   24px;\n  --space-6:   32px;\n  --space-7:   48px;\n  --space-8:   64px;\n  --space-9:   96px;\n  --space-10: 128px;\n\n  /* =========================================================\n     RADII\n     ========================================================= */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;     /* buttons, inputs */\n  --radius-lg: 12px;    /* small cards */\n  --radius-xl: 16px;    /* cards, modals */\n  --radius-2xl: 24px;   /* marketing hero cards */\n  --radius-full: 9999px;\n\n  /* =========================================================\n     SHADOWS - soft, warm graphite, never blueish‑grey\n     ========================================================= */\n  --shadow-xs: 0 1px 1px rgba(54,65,68,0.04);\n  --shadow-sm: 0 1px 2px rgba(54,65,68,0.06),\n               0 1px 1px rgba(54,65,68,0.04);\n  --shadow-md: 0 4px 12px rgba(54,65,68,0.08),\n               0 2px 4px rgba(54,65,68,0.05);\n  --shadow-lg: 0 16px 40px rgba(54,65,68,0.12),\n               0 4px 12px rgba(54,65,68,0.08);\n  --shadow-xl: 0 32px 80px rgba(54,65,68,0.18),\n               0 8px 24px rgba(54,65,68,0.10);\n  --shadow-focus: 0 0 0 4px rgba(19,106,127,0.22);\n\n  /* =========================================================\n     MOTION\n     ========================================================= */\n  --ease-standard: cubic-bezier(0.2, 0.0, 0.0, 1.0);\n  --ease-emphasized: cubic-bezier(0.2, 0.0, 0.0, 1.0);\n  --ease-decelerate: cubic-bezier(0, 0, 0, 1);\n  --dur-hover: 150ms;\n  --dur-state: 220ms;\n  --dur-reveal: 400ms;\n\n  /* =========================================================\n     LAYOUT\n     ========================================================= */\n  --container-max: 1280px;\n  --container-narrow: 880px;\n  --grid-gutter: 24px;\n  --nav-h: 72px;\n  --console-topbar-h: 56px;\n  --console-sidebar-w: 240px;\n}\n\n/* ============================================================\n   Semantic element styles - opt in by importing this file\n   and using normal HTML; or compose with the classes below.\n   ============================================================ */\n\nhtml {\n  background: var(--bg);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-base);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6,\n.h1, .h2, .h3, .h4, .h5, .h6 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  color: var(--fg-1);\n  letter-spacing: var(--tracking-snug);\n  text-wrap: balance;\n  word-spacing: var(--word-spacing-display);\n  margin: 0;\n}\n\nh1, .h1 { font-size: var(--fs-h1); line-height: var(--lh-tight); letter-spacing: var(--tracking-tight); }\nh2, .h2 { font-size: var(--fs-h2); line-height: var(--lh-snug);  letter-spacing: var(--tracking-tight); }\nh3, .h3 { font-size: var(--fs-h3); line-height: var(--lh-snug); }\nh4, .h4 { font-size: var(--fs-h4); line-height: var(--lh-snug); }\nh5, .h5 { font-size: var(--fs-h5); line-height: var(--lh-snug); font-weight: 500; }\nh6, .h6 { font-size: var(--fs-h6); line-height: var(--lh-snug); font-weight: 500; }\n\n.display-1 { font-family: var(--font-display); font-weight: 500; font-size: var(--fs-display-1); line-height: var(--lh-tight); letter-spacing: -0.025em; }\n.display-2 { font-family: var(--font-display); font-weight: 500; font-size: var(--fs-display-2); line-height: var(--lh-tight); letter-spacing: -0.022em; }\n\n.eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  font-weight: 500;\n  color: var(--fg-3);\n}\n\np {\n  margin: 0;\n  font-size: var(--fs-body);\n  line-height: var(--lh-base);\n  color: var(--fg-2);\n  text-wrap: pretty;\n}\np.lede { font-size: var(--fs-body-lg); color: var(--fg-1); line-height: var(--lh-loose); }\nsmall, .caption { font-size: var(--fs-caption); color: var(--fg-3); }\ncode, pre, kbd, samp { font-family: var(--font-mono); font-size: var(--fs-mono); }\npre { background: var(--neutral-100); border-radius: var(--radius-md); padding: var(--space-4); overflow-x: auto; }\ncode { background: var(--neutral-100); padding: 0.1em 0.35em; border-radius: var(--radius-xs); }\na { color: var(--link); text-decoration-thickness: 1px; text-underline-offset: 3px; transition: color var(--dur-hover) var(--ease-standard); }\na:hover { color: var(--link-hover); text-decoration-thickness: 2px; }\n\nhr { border: 0; border-top: 1px solid var(--border-1); margin: var(--space-6) 0; }\n\n::selection { background: rgba(233, 111, 76, 0.24); color: var(--fg-1); }\n\n:focus-visible {\n  outline: 2px solid var(--focus-ring);\n  outline-offset: 2px;\n  border-radius: var(--radius-sm);\n}\n<\u002Fstyle>\n  <style>\n    html, body { background: #0F1B20; }\n    body { padding: 0; margin: 0; padding-left: 220px; box-sizing: border-box; }\n    .doc { max-width: 880px; margin: 0 auto; background: var(--bg); box-shadow: 0 0 0 1px var(--border-1); }\n\n    /* Page chrome */\n    .page { position: relative; padding: 80px 96px 96px; page-break-after: always; break-after: page; }\n    .page:last-of-type { page-break-after: auto; }\n    .page-head {\n      display: flex; align-items: center; justify-content: space-between;\n      font-family: var(--font-body); font-size: 11px; letter-spacing: .14em;\n      text-transform: uppercase; color: var(--fg-3); font-weight: 500;\n      padding-bottom: 28px; border-bottom: 1px solid var(--border-1); margin-bottom: 56px;\n    }\n    .page-head .brand {\n      display: inline-flex; align-items: center; gap: 10px;\n      color: var(--fg-1); font-family: var(--font-display);\n      font-weight: 700; font-size: 16px; letter-spacing: -0.02em; text-transform: none;\n    }\n    .page-head .brand svg { width: 26px; height: 26px; }\n\n    /* Cover */\n    .cover {\n      background: #1A1F21; color: #fff; padding: 0;\n      min-height: 1080px; display: flex; flex-direction: column;\n      overflow: hidden; position: relative; page-break-after: always;\n    }\n    .cover .cover-photo { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; }\n    .cover .cover-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }\n    .cover .cover-scrim {\n      position: absolute; inset: 0; z-index: 1; pointer-events: none;\n      background: linear-gradient(180deg, rgba(20,30,36,0.55) 0%, rgba(20,30,36,0.10) 24%, rgba(20,30,36,0.04) 50%, rgba(20,30,36,0.72) 100%);\n    }\n    .cover-inner { position: relative; z-index: 2; padding: 64px 80px 56px; display: flex; flex-direction: column; flex: 1; min-height: 1080px; box-sizing: border-box; }\n    .cover .cover-head { display: flex; align-items: center; justify-content: space-between; }\n    .cover .cover-head .brand { display: inline-flex; align-items: center; gap: 14px; font-family: var(--font-display); font-weight: 700; font-size: 24px; letter-spacing: -0.02em; color: #fff; }\n    .cover .cover-head .brand svg { width: 44px; height: 44px; }\n    .cover .cover-head .meta { font-family: var(--font-body); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.7); font-weight: 500; }\n    .cover .cover-body { margin-top: auto; position: relative; z-index: 2; padding-top: 56px; max-width: 920px; }\n    .cover .eyebrow-top { font-size: 13px; letter-spacing: .18em; text-transform: uppercase; font-weight: 500; color: #FFD8C9; margin-bottom: 28px; }\n    .cover h1 { font-family: var(--font-display); font-weight: 500; font-size: 132px; line-height: 0.94; letter-spacing: -0.045em; margin: 0; text-wrap: balance; color: #fff; text-shadow: 0 2px 28px rgba(0,0,0,0.22); }\n    .cover .subtitle { margin-top: 22px; font-family: var(--font-display); font-weight: 400; font-size: 30px; line-height: 1.2; letter-spacing: -0.012em; color: rgba(255,255,255,0.96); max-width: 760px; text-shadow: 0 2px 16px rgba(0,0,0,0.22); }\n    .cover .deck-meta { margin-top: 36px; font-size: 15.5px; line-height: 1.55; color: rgba(255,255,255,0.88); max- -- COVER -->\n  <section class=\"cover\" data-screen-label=\"Cover\">\n    <image-slot id=\"meddicc-cover-photo\" class=\"cover-photo\" src=\"assets/cover-dune.png\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a landscape brand photo\" style=\"--slot-bg:#1A1F21;--slot-fg:rgba(255,255,255,0.55);--slot-border:rgba(255,255,255,0.18);\">\n    <\u002Fimage-slot>\n    <div class=\"cover-scrim\"><\u002Fdiv>\n    <div class=\"cover-inner\">\n      <div class=\"cover-head\">\n        <span class=\"brand\">\n          <svg viewBox=\"0 0 416 310\" fill=\"none\" style=\"width:44px;height:44px;\"><path fill=\"#fff\" fill-rule=\"evenodd\" d=\"M45.54,208.21c0-23.26,14.21-43.19,34.42-51.61.24,0,.48-.04,.71-.13,21.86-8.86,44.83-2.68,61.17,13.55,13.05,12.96,26.02,26.03,39,39.09-4.33,5.09-37.02,37.03-39.63,39.17-11.44,9.35-24.76,15.82-39.77,15.82-30.87,0-55.89-25.02-55.89-55.89M278.2,251.17c-.08-.07-.61-.57-.61-.57l-41.41-41.64c2.45-2.47,39.16-39.48,46.49-46.65,15.66-10.88,35.65-12.82,52.86-5.84.17.07.35.1.52.12,20.23,8.41,34.45,28.35,34.45,51.62,0,30.87-25.02,55.89-55.89,55.89-13.92,0-26.62-4.51-36.41-12.93M167.07,139.47c-9.27-9.98-14.94-23.34-14.94-38.03,0-30.87,25.02-55.89,55.89-55.89s55.89,25.02,55.89,55.89c0,14.58-5.58,27.85-14.73,37.8l-40.78,41.79-41.33-41.55ZM112.21,101.43c0,3.95.25,7.85.71,11.68-4.82-.57-9.68-.77-14.53-.6,0-.02,0-.04,0-.06-51.5,1.61-92.76,43.86-92.76,95.76s42.9,95.81,95.81,95.81c25.26,0,47.93-8.66,65.36-25.76l.04.04,41.53-41.53c.21.21.42.42.63.64,11.93,11.93,23.6,24.12,35.71,35.85,19.5,18.9,42.3,30.77,69.9,30.77,52.91,0,95.81-42.9,95.81-95.81s-41.26-94.15-92.76-95.76c0,.02,0,.04,0,.06-4.85-.16-9.7.05-14.53.62.47-3.83.71-7.74.71-11.7,0-52.91-42.89-95.81-95.81-95.81s-95.81,42.9-95.81,95.81\"><\u002Fpath><\u002Fsvg>\n          EDB\n        <\u002Fspan>\n        <span class=\"meta\">Sales Effectiveness · Train-the-Trainer<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cover-body\">\n        <div class=\"eyebrow-top\">&nbsp; KNOWLEDGE BRIEF&nbsp;<\u002Fdiv>\n        <h1>MEDDICC.<\u002Fh1>\n        <div class=\"subtitle\">Building the depth you need to facilitate, diagnose, and coach.<\u002Fdiv>\n        <div class=\"deck-meta\">Pre-Read for Train-the-Trainer London, June 2026. Complete before you arrive.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cover-foot\">\n        <div class=\"prepared\"><b>Prepared by Revlogic<\u002Fb>For the EDB Enablement Practitioners.<\u002Fdiv>\n        <span>Confidential · Internal<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW TO USE -->\n  <section class=\"page\" data-screen-label=\"How to use this guide\">\n    <header class=\"page-head\">\n      <span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan>\n      <span>MEDDICC · Deep Knowledge Brief<\u002Fspan>\n    <\u002Fheader>\n    <div class=\"eyebrow\">Foreword<\u002Fdiv>\n    <h1 class=\"section-title\">How to Use This Guide<\u002Fh1>\n    <p class=\"lede\">Before you co-facilitate a session in London, you need more than the framework. You need the depth to coach, diagnose, and show up in real deal conversations - not just teach.<\u002Fp>\n    <h3>Document Audience<\u002Fh3>\n    <p>This document is for the EDB Enablement practitioners who will own the MEDDICC program after Revlogic hands off - specifically those co-facilitating during the initial rollout and taking independent ownership of facilitation, diagnosis, and coaching support afterward.<\u002Fp>\n    <h3>Prerequisite: MEDDICC 101 eLearning<\u002Fh3>\n    <p>This document assumes you have completed the EDB MEDDICC 101 eLearning module. The eLearning establishes the foundation. This document builds the depth you need to operate in three distinct modes.<\u002Fp>\n    <h2>The three modes this document prepares you for<\u002Fh2>\n    <div class=\"mode-row\">\n      <div class=\"mode-card\"><div class=\"num\">MODE 01<\u002Fdiv><h4>Live Facilitation<\u002Fh4><p>Running structured training sessions where MEDDICC is the content. During the initial rollout you co-facilitate alongside Revlogic. After handoff, you own it independently.<\u002Fp><\u002Fdiv>\n      <div class=\"mode-card\"><div class=\"num\">MODE 02<\u002Fdiv><h4>Gap Diagnosis<\u002Fh4><p>Reading qualification signals in the data - pipeline conversion patterns, deal slippage, AuraSell scores - and translating what you see into a skill gap diagnosis.<\u002Fp><\u002Fdiv>\n      <div class=\"mode-card\"><div class=\"num\">MODE 03<\u002Fdiv><h4>Live Operating Rhythm<\u002Fh4><p>Being present in deal reviews, QBRs, forecast calls, and coaching sessions alongside Sales Leaders - contributing coaching-level observations in real time.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pull\"><p>Complete this document in full. Score yourself honestly on the self-assessment. Bring one real deal to London - a current or recent opportunity you know well enough to use as a live practice case.<\u002Fp><\u002Fdiv>\n    <footer class=\"page-foot\"><span>Foreword<\u002Fspan><span class=\"pagenum\">01<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 1 DIVIDER -->\n  <section class=\"divider\" data-screen-label=\"Section 1 divider\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 01 · The Philosophy Behind MEDDICC<\u002Fspan><\u002Fheader>\n    <div class=\"chapter\">01<\u002Fdiv>\n    <div class=\"divider-body\">\n      <div class=\"eyebrow\">Section one<\u002Fdiv>\n      <h2 class=\"div-title\">Why MEDDICC - and the philosophy behind it.<\u002Fh2>\n      <p class=\"div-lede\">The case for this framework, the history that led here, and the mindset that separates people who know MEDDICC from people who use it.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY MEDDICC - NEW SECTION -->\n  <section class=\"page\" data-screen-label=\"Why MEDDICC\">\n    <header class=\"page-head\">\n      <span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 5px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan>\n      <span>Why MEDDICC - The Case for This Framework<\u002Fspan>\n    <\u002Fheader>\n    <div class=\"eyebrow\">Context<\u002Fdiv>\n    <h1 class=\"section-title\" style=\"font-size: 64px;\">Why MEDDICC&nbsp;<div style=\"font-size: 32px;\">The Case for This Framework<\u002Fdiv><\u002Fh1>\n    <p class=\"lede\">Sales qualification frameworks are not new. Understanding where MEDDICC fits in the history of structured qualification - and what it does differently - is what allows you to explain its value to sellers who have heard this all before.<\u002Fp>\n    <h2 style=\"\">The frameworks that came before<\u002Fh2>\n    <p><b>BANT<\u002Fb> - Budget, Authority, Need, Timeline - was designed for short, single-stakeholder sales cycles. It tells you whether a deal could happen: does the buyer have budget, authority, need, and a timeline? It does not tell you whether the deal will happen, who will make it happen internally, or what you need to do to get there.<\u002Fp>\n    <p><b>SPIN Selling<\u002Fb> introduced a more sophisticated approach to discovery - asking Situation, Problem, Implication, and Need-Payoff questions to develop the buyer's own articulation of their problem. SPIN improved discovery quality but was not designed as a deal qualification framework. It does not address the buying organization, the decision process, or the competitive landscape.<\u002Fp>\n    <p><b>SCOTSMAN<\u002Fb> and similar frameworks introduced more comprehensive qualification thinking - covering solution fit, competition, originality, timeline, size, money, authority, and need. These frameworks moved toward the multi-stakeholder reality of enterprise sales but still lacked the depth on Champion, Pain escalation, and process mapping that complex deals require.<\u002Fp>\n    <h2>Where MEDDICC's value lies<\u002Fh2>\n    <p>MEDDICC was built specifically for complex, multi-stakeholder enterprise sales where the Economic Buyer rarely appears in early conversations, multiple people influence the decision without having authority, and the decision process involves layers of approval that are invisible until they block the deal.<\u002Fp>\n    <p>What distinguishes MEDDICC from its predecessors is the specific combination of letters - the insistence on identifying both the pain and the metrics that quantify it; the distinction between a Champion and a contact; and the explicit mapping of how the decision will actually be made, not just what criteria will be used.<\u002Fp>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>MEDDICC tells you whether a deal will happen - and what you need to do to make it more likely.<\u002Fp><\u002Fdiv>\n\n    <h2>MEDDICC across the revenue team<\u002Fh2>\n    <p>MEDDICC is most commonly taught as an AE framework. But the letters show up at every stage of the revenue motion - and every revenue role has a different vantage point on whether the deal is real. Understanding how each role engages with MEDDICC is part of what makes it a team operating discipline rather than a rep-level checklist.<\u002Fp>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Role<\u002Fdiv><div>MEDDICC Lens<\u002Fdiv><div>Goal<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>SDR<\u002Fstrong><\u002Fdiv><div><strong>I<\u002Fstrong> - pain is real and named, not inferred. <strong>E<\u002Fstrong> - a path to the EB exists. <strong>M<\u002Fstrong> - a triggering condition has been surfaced. <strong>C<\u002Fstrong> - champion signal is present<\u002Fdiv><div>Prove the handoff is worth an AE's time: real pain, real urgency, real human<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Enterprise AE<\u002Fstrong><\u002Fdiv><div><strong>Full MEDDICC<\u002Fstrong> - complete qualification across the deal cycle. No letters assumed, no blanks rationalized<\u002Fdiv><div>Prove the deal is real, winnable, and closeable - documented business case, mapped process, tested Champion, and EB alignment<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>SE<\u002Fstrong><\u002Fdiv><div><strong>I<\u002Fstrong> - technical pain is tied to business consequence. <strong>D<\u002Fstrong> - EDB shaped the evaluation criteria, not reacted to them. <strong>C<\u002Fstrong> - Champion is technically credible enough to carry the story internally<\u002Fdiv><div>Prove technical control: EDB shaped the evaluation rather than competed inside someone else's<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Renewals<\u002Fstrong><\u002Fdiv><div><strong>M<\u002Fstrong> - value promised at close was delivered. <strong>I<\u002Fstrong> - the original pain was solved. <strong>C<\u002Fstrong> - Champion is still in role and aligned. <strong>E<\u002Fstrong> - EB is still connected to the value story<\u002Fdiv><div>Prove the conditions that closed the deal still exist - and that value was actually delivered<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Partner / Channel<\u002Fstrong><\u002Fdiv><div><strong>E<\u002Fstrong> - EDB has line of sight to the EB, not just the partner. <strong>M<\u002Fstrong> - business case is framed in customer language. <strong>I<\u002Fstrong> - partner understands business pain, not just technical requirement. <strong>C<\u002Fstrong> - Champion lives inside the end customer, not inside the partner<\u002Fdiv><div>Prove the deal can be underwritten at direct-deal quality despite information asymmetry<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h3>The connective thread<\u002Fh3>\n    <p>Pain, Champion, and Metrics are the spine of every deal - and they have to survive every handoff. The SDR surfaces them. The AE builds them. The SE stress-tests them technically. The renewals leader checks whether they held post-close. The partner leader assesses whether the channel even has them. If any of the three go unproven at any stage, the risk doesn't disappear - it just gets inherited by whoever comes next.<\u002Fp>\n    <div class=\"note\"><span>While the core MEDDICC principle remains - how teams leverage might look different depending on where they sit in the revenue motion. The framework is the same. The questions asked within it are not.<\u002Fspan><\u002Fdiv>\n    <h2>The discipline vs. the checklist<\u002Fh2>\n    <p>Every qualification framework can be reduced to a checklist, and every checklist, once it becomes a compliance exercise, stops working. The history of MEDDICC implementations in sales organizations is largely a history of compliance - fields filled in, stages advanced, the underlying qualification still absent.<\u002Fp>\n    <p>The organizations where MEDDICC becomes a durable discipline share a common characteristic: leaders use it as a coaching language, not a reporting tool. When a leader asks \"what has your Champion done that proves they will take risk on your behalf?\" rather than \"do you have a Champion?\", the framework is working as a discipline.<\u002Fp>\n    <p>As an Enablement practitioner, your job is to build the conditions for discipline rather than compliance. That starts with understanding the framework at a depth that lets you coach the distinctions that matter.<\u002Fp>\n    <div class=\"note\"><span><b>Note -<\u002Fb> While EDB primarily leverages MEDDICC, not MEDDPICC. Paper Process (P) might come up in Public Sector engagements. This briefing will focus on MEDDICC with an understanding that, situationally, P will be leveraged.<\u002Fspan><\u002Fdiv>\n    <footer class=\"page-foot\"><span>Why MEDDICC<\u002Fspan><span class=\"pagenum\">02<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 1 BODY -->\n  <section class=\"page\" data-screen-label=\"Section 1 body\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 01 · Philosophy<\u002Fspan><\u002Fheader>\n    <h1 class=\"section-num\">Section 01<\u002Fh1>\n    <h1 class=\"section-title\">The Philosophy Behind MEDDICC<\u002Fh1>\n    <p class=\"lede\">This section covers something the eLearning cannot cover: the gap between knowing a framework and using it as a discipline, why that gap is almost always wider than organizations expect, and what it actually takes to close it. These are the ideas you will need to articulate and defend in a room of experienced sellers.<\u002Fp>\n\n    <h2>Why knowledge does not become behavior<\u002Fh2>\n    <p>Every sales methodology program launches with genuine energy. Leaders are engaged. Reps complete the training. The framework goes into the CRM. And then, within six to nine months, adoption fades - not because the framework was wrong, but because knowledge was treated as the destination when it was only the starting point.<\u002Fp>\n    <p>The gap between knowing a framework and using it as a discipline is a behavioral and organizational problem, not a content problem. Reps who complete MEDDICC training understand what each letter means. What they have not yet changed is how they run discovery conversations, what questions they ask in a deal review, what evidence they bring to a forecast call, or what they do when a deal goes quiet and they do not know why. Behavior change requires repetition, reinforcement, accountability, and visible modeling from leadership. None of those come from a training course alone.<\u002Fp>\n    <p>Understanding this is foundational for an Enablement practitioner because it tells you what your job actually is. Your job is not to ensure people know MEDDICC. Your job is to build the conditions in which MEDDICC becomes the way people think, talk, and make decisions about deals.<\u002Fp>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>The transition from framework to discipline is a change management challenge, not a training challenge. Content establishes the baseline. The discipline is built in the operating rhythm - through inspection, coaching, and consistent reinforcement applied to real deals over time.<\u002Fp><\u002Fdiv>\n\n    <h2>What makes the discipline take hold<\u002Fh2>\n    <p>Organizations where MEDDICC becomes a durable discipline share a set of common conditions. Understanding these conditions tells you what to build toward - and where to look when adoption starts to decay.<\u002Fp>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>Condition<\u002Fdiv><div>What it looks like in practice<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Shared language<\u002Fstrong><\u002Fdiv><div>Every person in the revenue organization uses the same words to describe the same things. Deal reviews, forecast calls, and coaching conversations all use MEDDICC as the operating vocabulary. The shared language removes friction and makes it harder to avoid the framework than to use it.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Consistent inspection<\u002Fstrong><\u002Fdiv><div>A framework that is not inspected is not used - it is reported against. When managers ask for evidence rather than assertion in every deal review, the rep who says \"I have a Champion\" is immediately prompted to prove it. That moment, repeated consistently, is what builds the discipline.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Visible leadership modeling<\u002Fstrong><\u002Fdiv><div>Reps change behavior when they see their manager apply the framework to a real deal in real time. When a Sales Leader runs a deal review using evidence-based MEDDICC questions and surfaces a risk the rep had not seen, that demonstration is more powerful than any content module.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Connection to outcomes<\u002Fstrong><\u002Fdiv><div>Teams that sustain MEDDICC discipline can point to specific deals they won because the framework surfaced a risk early, specific forecasts that were more accurate because the Sequence of Events was verified, and specific reps whose qualification improved measurably over a quarter.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>As an Enablement practitioner, you are not delivering MEDDICC training. You are designing and maintaining the conditions that allow the discipline to take hold. Every session you facilitate, every gap you diagnose, every operating rhythm moment you show up in is a contribution to or a withdrawal from those conditions.<\u002Fp><\u002Fdiv>\n\n    <h2>The facilitator's change management role<\u002Fh2>\n    <p>When you stand in front of a room of experienced sellers to facilitate a MEDDICC session, you are not primarily there to transfer knowledge. The eLearning did that. You are there to shift the room from intellectual understanding to personal accountability - to move people from \"I know what MEDDICC is\" to \"I commit to using it differently in my next deal review.\"<\u002Fp>\n    <p>That shift requires treating every session as a coaching conversation rather than a presentation. It means using real deals from the room rather than hypothetical scenarios. It means pushing past the first answer - when someone says \"I have a Champion,\" the next question is always \"what have they done that proves it?\" - because the discipline lives in the follow-up, not the initial response. And it means closing every session with a verifiable commitment rather than general positive sentiment.<\u002Fp>\n    <p>It also means holding the room accountable for the gap between what people say they understand and what the data shows they are actually doing. A facilitator who lets the room feel good about their MEDDICC knowledge without confronting the gap between knowledge and practice has not moved the dial. A facilitator who surfaces that gap constructively - using deal patterns rather than finger-pointing - gives the room something real to work with.<\u002Fp>\n\n    <h2>Common participant profiles - and how to handle each<\u002Fh2>\n    <p>Every live session involves a range of participant profiles. Knowing how to read the room and respond to each type is one of the most practical skills a facilitator can develop.<\u002Fp>\n\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>Profile<\u002Fdiv><div>How to handle them<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>The Veteran<\u002Fstrong><br><span style=\"font-size:13px;color:var(--fg-3);font-weight:400;\">15-20 years in enterprise sales. Politely skeptical. \"I have heard this before.\"<\u002Fspan><\u002Fdiv><div>Do not try to convince them the framework is new. Acknowledge their experience directly and ask what made the difference in organizations where a qualification discipline actually held. Their answer will surface the conditions you have just explained, coming from their own experience. The Veteran becomes your most powerful ally when they feel their knowledge is being used rather than dismissed.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>The Skeptic<\u002Fstrong><br><span style=\"font-size:13px;color:var(--fg-3);font-weight:400;\">Believes their deals or market are genuinely different from what the framework assumes.<\u002Fspan><\u002Fdiv><div>Do not argue with their market knowledge. Acknowledge the complexity they describe, then ask a diagnostic question that connects their specific challenge to a MEDDICC letter. Channel deal complexity is a Decision Process and Champion problem. Relationship-driven markets are an Economic Buyer access and Champion motivation problem. The framework is not invalidated by their context - it surfaces the specific qualification challenge their context creates.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>The Compliant Participant<\u002Fstrong><br><span style=\"font-size:13px;color:var(--fg-3);font-weight:400;\">Agrees with everything. Textbook answers. Always has a Champion. Until they do not.<\u002Fspan><\u002Fdiv><div>Ask them to prove it. \"Walk me through what your Champion did last week\" is more useful than \"do you have a Champion?\" Push the evidence standard consistently so the gap between stated qualification and actual evidence becomes visible - to them, not to you.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>The Overwhelmed Rep<\u002Fstrong><br><span style=\"font-size:13px;color:var(--fg-3);font-weight:400;\">Carrying too many deals, moving too fast. Honest about the gaps.<\u002Fspan><\u002Fdiv><div>Use their honesty as a teaching moment for the room. When they describe a deal where they genuinely do not know who the Economic Buyer is, that is exactly what MEDDICC is designed to surface. Acknowledge the gap without judgment, ask the room what the next action should be, and let the collaborative problem-solving model what good coaching looks like.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>The Converted Believer<\u002Fstrong><br><span style=\"font-size:13px;color:var(--fg-3);font-weight:400;\">Has seen MEDDICC work before. Enthusiastic. Uses the right language.<\u002Fspan><\u002Fdiv><div>Give them a role. Ask them to share the specific deal where MEDDICC made a difference, then probe for behavioral evidence - not \"you knew the Champion was tested\" but \"what specifically did you ask, and what did they do that proved it?\" Their story is most powerful when it is specific enough to be replicable.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2>What MEDDICC is not - misconceptions you will encounter<\u002Fh2>\n    <ul class=\"misconceptions\">\n      <li><span class=\"mc-prefix\">It is not a</span><span class=\"mc-keyword\">checklist</span><span class=\"mc-desc\">to complete before advancing a stage - stage advancement based on checkbox compliance is one of the most common ways MEDDICC gets implemented and then ignored.</span><\u002Fli>\n      <li><span class=\"mc-prefix\">It is not a</span><span class=\"mc-keyword\">reporting tool</span><span class=\"mc-desc\">for management visibility - it is a coaching and qualification tool; the data it surfaces is a byproduct of good practice, not the point of the exercise.</span><\u002Fli>\n      <li><span class=\"mc-prefix\">It is not</span><span class=\"mc-keyword\">something that happens once at deal entry</span><span class=\"mc-desc\">- the letters are living; a Champion who was strong in week three may have lost influence by week eight.</span><\u002Fli>\n      <li><span class=\"mc-prefix\">It is not a</span><span class=\"mc-keyword\">guarantee of winning</span><span class=\"mc-desc\">- it is a guarantee of knowing: knowing what you have, what you are missing, and what you need to do next.</span><\u002Fli>\n    <\u002Ful>\n    <div class=\"key-principle\">\n      <div class=\"kp-label\">Key Principle<\u002Fdiv>\n      <p>The mindset shift that separates facilitators who change behavior from those who deliver a good presentation: the eLearning established the letters. London will build the operating rigor to keep them alive in the field.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 01 · Philosophy<\u002Fspan><span class=\"pagenum\">03<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- SECTION 2 DIVIDER -->\n  <section class=\"divider\" data-screen-label=\"Section 2 divider\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 02 · The Letters in Depth<\u002Fspan><\u002Fheader>\n    <div class=\"chapter\">02<\u002Fdiv>\n    <div class=\"divider-body\">\n      <div class=\"eyebrow\">Section two<\u002Fdiv>\n      <h2 class=\"div-title\">The letters, in depth.<\u002Fh2>\n      <p class=\"div-lede\">Seven letters. Seven failure modes. The depth you need to coach each one - and the EDB-specific patterns that matter most.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- M - METRICS -->\n  <section class=\"letter-page\" data-screen-label=\"M - Metrics\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 02 · Letter 1 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark\">\n      <div class=\"glyph\">M<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 01 · Metrics<\u002Fdiv>\n        <h3 class=\"name\">Metrics<\u002Fh3>\n        <div class=\"descriptor\">Quantifying the value of change - confirmed by the right person at the right time.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">Metrics is not about your ROI calculator. It is about whether the customer has quantified, in their own terms, the cost of staying in their current state and the value of changing. Strong Metrics work happens in discovery - by proposal stage you should be reflecting back numbers the customer has already validated.<\u002Fp>\n\n    <h2>Two types of Metrics - and why both matter<\u002Fh2>\n    <div class=\"vs-table\">\n      <div class=\"vs-head left\">Technical Metrics<\u002Fdiv><div class=\"vs-head right\" style=\"background-color: rgb(0, 130, 94);\">Business Metrics<\u002Fdiv>\n      <div class=\"vs-row\"><div>Performance, speed, uptime, efficiency<\u002Fdiv><div class=\"right\">Revenue impact, cost reduction, risk mitigation, strategic outcome<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Cared about by technical evaluators and Champions<\u002Fdiv><div class=\"right\">Cared about by Economic Buyers and budget holders<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Justify the solution choice<\u002Fdiv><div class=\"right\">Justify the investment and create personal conviction<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Risk: Selling without confirming technical parameters leads to misaligned expectations, poor post-sale onboarding, and frustrated customers who do not achieve promised outcomes<\u002Fdiv><div class=\"right\">Risk: Without these, the EB has no personal stake in the outcome - deal closes but does not implement<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- VISUAL: M1/M2/M3 Lifecycle -->\n    <h2>Three levels of Metrics - M1, M2, M3<\u002Fh2>\n    <div style=\"margin: 16px 0 28px; break-inside: avoid;\">\n      <div style=\"display: grid; grid-template-columns: 1fr 40px 1fr 40px 1fr; align-items: stretch; gap: 0;\">\n        <div style=\"background: rgba(0,130,94,0.08); border: 1px solid rgba(0,130,94,0.3); border-radius: 12px; padding: 20px 18px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #00825E; font-weight: 600;\">M1 · Pre-sale<\u002Fdiv>\n          <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 16px; color: var(--fg-1);\">Proof Points<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.5;\">Quantifiable outcomes delivered for existing customers in similar situations. Benchmarks and case study data.<\u002Fdiv>\n          <div style=\"font-size: 12px; color: var(--fg-3); line-height: 1.4; margin-top: 4px;\"><strong style=\"color: var(--fg-2);\">Purpose:<\u002Fstrong> Show the EB what is possible. Anchor conversations in proven results, not promises.<\u002Fdiv>\n          <div style=\"margin-top: 8px; padding: 7px 10px; background: rgba(0,130,94,0.10); border-radius: 6px; font-size: 11px; color: #00825E; font-style: italic;\">\"Here is what we delivered for customers like you\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M6 14h16M16 8l6 6-6 6\" stroke=\"#00825E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background: rgba(0,130,94,0.14); border: 1px solid rgba(0,130,94,0.45); border-radius: 12px; padding: 20px 18px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #00825E; font-weight: 600;\">M2 · Mid-sale<\u002Fdiv>\n          <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 16px; color: var(--fg-1);\">Personalized Value<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.5;\">Customized, quantifiable goals built collaboratively with your Champion and validated by the EB.<\u002Fdiv>\n          <div style=\"font-size: 12px; color: var(--fg-3); line-height: 1.4; margin-top: 4px;\"><strong style=\"color: var(--fg-2);\">Purpose:<\u002Fstrong> Show the EB exactly how your solution impacts their specific business metrics. Creates personal conviction.<\u002Fdiv>\n          <div style=\"margin-top: 8px; padding: 7px 10px; background: rgba(0,130,94,0.14); border-radius: 6px; font-size: 11px; color: #00825E; font-style: italic;\">\"Here is exactly what this means for your business\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M6 14h16M16 8l6 6-6 6\" stroke=\"#00825E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background: rgba(0,130,94,0.22); border: 2px solid rgba(0,130,94,0.6); border-radius: 12px; padding: 20px 18px; display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #00825E; font-weight: 600;\">M3 · Post-sale<\u002Fdiv>\n          <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 16px; color: var(--fg-1);\">Realized Value<\u002Fdiv>\n          <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.5;\">Validated outcomes achieved after go-live. M2s transform into M3s post-implementation.<\u002Fdiv>\n          <div style=\"font-size: 12px; color: var(--fg-3); line-height: 1.4; margin-top: 4px;\"><strong style=\"color: var(--fg-2);\">Purpose:<\u002Fstrong> Measure exact value delivered. Foundation for renewal, expansion, and advocacy conversations.<\u002Fdiv>\n          <div style=\"margin-top: 8px; padding: 7px 10px; background: rgba(0,130,94,0.18); border-radius: 6px; font-size: 11px; color: #00825E; font-style: italic;\">\"Here is the value we actually delivered\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 10px; padding: 10px 14px; background: var(--neutral-100); border-radius: 8px; font-size: 12px; color: var(--fg-3); text-align: center;\">\n        The deployment gap happens when M2 is never EB-validated - the deal closes but M3 is never measured\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>Most sellers stop at M1. Deals close with urgency when the Economic Buyer personally validates M2s - and implementation succeeds when M3s are tracked and communicated back to the customer.<\u002Fp><\u002Fdiv>\n\n    <h2>The deployment gap - Metrics in post-sales<\u002Fh2>\n    <p>Metrics play a critical role in the post-sales process. The M2s you built with your customer transform into M3s - the value you strive to deliver once the solution goes live. Tracking M3s ensures customers achieve the outcomes they were promised, gives your Champion internal proof of value, and makes renewal conversations significantly easier.<\u002Fp>\n    <p>The most visible downstream consequence of Metrics failure is a deal that closes but is never implemented. When the value case has only been confirmed at M1 with no customer-validated M2, the EB approved on logical grounds without personal conviction - and there is no internal urgency to drive adoption post-signature.<\u002Fp>\n    <h2>Metrics across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>Metrics focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Use M1s (past customer proof points) to anchor discovery. Ask how the prospect measures success today.<\u002Fdiv><div>Prospect confirms 2-3 measurable outcomes they care about. Language starts coming from them, not you.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Build M2s collaboratively with your Champion. Quantify the cost of inaction. Work toward EB validation.<\u002Fdiv><div>Champion can articulate the business case in their own words. EB has reviewed and reacted positively to the numbers.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>Use EB-validated M2s to anchor negotiation and close. Set expectations for M3 tracking post-implementation.<\u002Fdiv><div>EB personally owns the outcome. M2s are documented and agreed. M3 framework is in place for post-sales handoff.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>What good Metrics looks like at EDB<\u002Fh2>\n    <div class=\"at-edb\" style=\"background-color: rgb(0, 130, 94)\">\n      <div class=\"badge\">At EDB · Metrics<\u002Fdiv>\n      <h4>What good Metrics looks like at EDB<\u002Fh4>\n      <p>At early stage, good Metrics work means the prospect has named 2-3 measurable outcomes in their own language - not benchmarks you provided. Common early-stage Metrics signals at EDB include Oracle license cost visibility, infrastructure consolidation estimates, and time-to-value for migration workloads.<\u002Fp>\n      <p>At mid stage, the Champion can articulate the business case without your help. The Economic Buyer has reviewed the cost model and responded to it personally. The M2 is customer-data-driven, not seller-estimated.<\u002Fp>\n      <p>At late stage, the deployment gap risk is highest. A deal without EB-validated M2s at commit is a deal at risk of closing but never implementing. The post-sales team should receive a clear M3 framework at handoff so that value realization can be tracked and communicated at renewal.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · M · Metrics<\u002Fspan><span class=\"pagenum\">04<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- E - ECONOMIC BUYER -->\n  <section class=\"letter-page\" data-screen-label=\"E - Economic Buyer\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height:26px;width:auto;display:inline-block;vertical-align:middle;\"><\u002Fspan><span>Section 02 · Letter 2 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark warm\">\n      <div class=\"glyph\">E<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 02 · Economic Buyer<\u002Fdiv>\n        <h3 class=\"name\">Economic Buyer<\u002Fh3>\n        <div class=\"descriptor\">The person with discretionary authority over the budget - and the Go/No-Go of the deal.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">The Economic Buyer is the person with <b>discretionary use of the funds<\u002Fb>. They can reallocate budget from one project to another, approve outside of the normal budget cycle, or kill an approved purchase. This distinguishes them from a budget holder who controls a line item but cannot exercise discretion over how it is spent.<\u002Fp>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>Think of the Economic Buyer meeting as a wall. A successful meeting - where priority, budget, and criteria are confirmed - means you have made it over the wall. An unsuccessful one means the sales process was never as advanced as it appeared.<\u002Fp><\u002Fdiv>\n    <h2>The three-tier buying map<\u002Fh2>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>Buyer level<\u002Fdiv><div>Role in the decision<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Technical evaluators<\u002Fdiv><div>Assess whether the solution meets functional requirements. Significant influence over evaluation, rarely have budget authority.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Decision-makers<\u002Fdiv><div>Synthesize evaluation results and make formal recommendations. Have influence but not unilateral authority. Often confused with the EB.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div>Economic Buyer<\u002Fdiv><div>Approves the financial commitment with discretionary authority. May appear late in the process. Their personal conviction drives urgency - or kills it.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>EB access vs. EB relationship<\u002Fh2>\n    <div class=\"vs-table\">\n      <div class=\"vs-head left\">EB Access<\u002Fdiv><div class=\"vs-head right\" style=\"background-color: rgb(231, 111, 76)\">EB Relationship<\u002Fdiv>\n      <div class=\"vs-row\"><div>You have met with the EB<\u002Fdiv><div class=\"right\">The EB has personally engaged with your value case<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>They attended a demo or briefing<\u002Fdiv><div class=\"right\">They have connected the problem to their own business measures<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>You can get a meeting<\u002Fdiv><div class=\"right\">They have said something signaling personal stake in the outcome<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>You know their name and title<\u002Fdiv><div class=\"right\">They are not passive - they are invested in the right outcome<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2>Preparing for the EB meeting<\u002Fh2>\n    <p>A well-prepared EB meeting needs to substantiate nine things: 1) a high-level summary of the current state; 2) the current pain and its negative consequences; 3) the quantified cost in terms the EB measures by; 4) the implications of not solving it; 5) the proposed future state; 6) required capabilities; 7) decision criteria reflecting those capabilities; 8) customer success stories with quantified outcomes; and 9) confirmation of remaining decision process steps.<\u002Fp>\n    <h2>What the Economic Buyer will ask<\u002Fh2>\n    <p>EB questions centralize around four themes: financial impact and ROI, risk mitigation and stability, strategic alignment and priority, and implementation and adoption.<\u002Fp>\n    <div class=\"ctable c2\">\n      <div class=\"ct-head\"><div>EB dimension<\u002Fdiv><div>Representative questions<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>1. Financial Impact &amp; ROI<\u002Fstrong><\u002Fdiv><div>\"What is the exact ROI and how did you calculate it?\" \"What is this problem costing us annually?\" \"How much will we save or gain, and over what timeframe?\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>2. Risk Mitigation &amp; Stability<\u002Fstrong><\u002Fdiv><div>\"What happens if this project fails to hit its targets in the next 6-12 months?\" \"What risks are associated with switching from our current system?\" \"How stable is your company?\" \"What level of internal change management will we need to provide?\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>3. Strategic Alignment &amp; Priority<\u002Fstrong><\u002Fdiv><div>\"Where does this rank against our other company goals for the fiscal year?\" \"What is the worst-case scenario if we do nothing?\" \"Who internally will be accountable for ensuring this delivers on its promises?\"<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>4. Implementation &amp; Adoption<\u002Fstrong><\u002Fdiv><div>\"How long will it take for my team to be fully trained?\" \"Will this integrate smoothly with our current tech stack?\" \"How easy is this for the people doing day-to-day work?\"<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note\"><span><strong>Pro Tip:<\u002Fstrong> If your prospect blocks you from speaking to the Economic Buyer, it is a major red flag that you are dealing with a Champion who lacks true decision-making power. A tested Champion arranges EB access - they do not prevent it.<\u002Fspan><\u002Fdiv>\n    <h2>EB engagement across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>EB focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Connect the pain you have identified to the EB's business objectives. Do not present yet - listen.<\u002Fdiv><div>EB confirms the problem is real and matters to them personally. You understand how they measure success.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Show how your solution solves their business objective. Use this to shape - and then match - their decision criteria.<\u002Fdiv><div>EB has reviewed your M2 value case. Their language is reflected in the criteria being used to evaluate vendors.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>Consensus and support mapping through the Decision Process. EB is personally driving urgency toward a decision.<\u002Fdiv><div>EB is advocating internally for the investment. They can articulate why this initiative must happen now.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"at-edb\" style=\"background-color: rgb(231, 111, 76)\">\n      <div class=\"badge\">At EDB · Economic Buyer<\u002Fdiv>\n      <h4>Economic Buyer at EDB<\u002Fh4>\n      <p>The most common EB qualification failure at EDB is mistaken identity - engaging the wrong person as the Economic Buyer and building qualification around that assumption until it fails late in the deal. In database infrastructure decisions, the person driving the technical evaluation is rarely the same person with discretionary budget authority.<\u002Fp>\n      <p>In EMEA markets, EB access is often brokered through relationship intermediaries. The formal buying process may run in parallel with an informal decision track. Understanding which track actually controls the outcome - and who the real EB is in each - is the qualification work that separates deals that close from deals that stall.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · E · Economic Buyer<\u002Fspan><span class=\"pagenum\">05<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- D - DECISION CRITERIA -->\n  <section class=\"letter-page\" data-screen-label=\"D - Decision Criteria\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 02 · Letter 3 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark deep\">\n      <div class=\"glyph\">D<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 03 · Decision Criteria<\u002Fdiv>\n        <h3 class=\"name\">Decision Criteria<\u002Fh3>\n        <div class=\"descriptor\">The evaluation standards the customer will use - and your opportunity to shape them.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">The depth beyond the eLearning definition is the active distinction between a seller who <em>documents<\u002Fem> what the customer values and a seller who <em>shapes<\u002Fem> what the customer values. Most sellers document. Shaping criteria means actively influencing what the customer evaluates toward your genuine strengths.<\u002Fp>\n    <h2>Technical criteria vs. business criteria<\u002Fh2>\n    <div class=\"vs-table\">\n      <div class=\"vs-head left\" style=\"background-color: rgb(132, 218, 237)\">Technical Criteria<\u002Fdiv><div class=\"vs-head right\" style=\"background-color: rgb(20, 117, 139)\">Business Criteria<\u002Fdiv>\n      <div class=\"vs-row\"><div style=\"font-weight: 500\">Evaluated by technical team and Champion<\u002Fdiv><div class=\"right\" style=\"font-weight: 500\">Evaluated by Economic Buyer and decision-makers<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Assess whether the solution works as required<\u002Fdiv><div class=\"right\">Assess strategic fit, risk, financial impact, vendor stability<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Most active early and mid cycle<\u002Fdiv><div class=\"right\">Decisive at approval stage<\u002Fdiv><\u002Fdiv>\n      <div class=\"vs-row\"><div>Risk if unfavorable: technical disqualification<\u002Fdiv><div class=\"right\">Risk if unfavorable: EB veto despite positive technical evaluation<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>Decision Criteria that you have not shaped are criteria your competitors may have shaped. In competitive deals, winning on criteria the customer wrote without your input is the exception, not the rule.<\u002Fp><\u002Fdiv>\n    <h2>How Metrics and Decision Criteria work together<\u002Fh2>\n    <p>Metrics and Decision Criteria are related but distinct. Metrics quantify the <em>value<\u002Fem> of the outcome your solution delivers. Decision Criteria define the <em>standards<\u002Fem> used to evaluate which vendor delivers it. The connection: your M2 Metrics should directly inform the business criteria the EB uses to evaluate vendors. A well-shaped set of Decision Criteria reflects the quantifiable outcomes your solution can deliver - making your Metrics the natural anchor for the evaluation.<\u002Fp>\n    <p>When they are misaligned, you can win on Metrics (strong ROI case) and still lose on Criteria (evaluated on dimensions that favor a competitor). The facilitator's job is to help sellers see that shaping Criteria and validating Metrics must happen in parallel, not sequentially.\n    <\u002Fp><h2>Active criteria shaping - what it looks like<\u002Fh2>\n    <ul class=\"list\">\n      <li>Introducing evaluation dimensions early that reflect your genuine differentiators - before the customer has finalized their criteria.<\u002Fli>\n      <li>Asking the customer to consider dimensions that your competitors genuinely cannot match.<\u002Fli>\n      <li>Providing reference architectures, benchmarks, or case studies that establish standards in your favor.<\u002Fli>\n      <li>Ensuring your Champion understands your differentiators well enough to advocate for favorable criteria internally.<\u002Fli>\n      <li>Reviewing draft RFP criteria and offering input - especially in enterprise accounts where you have executive access.<\u002Fli>\n    <\u002Ful>\n    <h2>When criteria lock - the RFP problem<\u002Fh2>\n    <p>In formal procurement processes, criteria are often locked once an RFP is issued. A seller who receives an RFP with unfavorable criteria has two choices: respond and hope for the best, or make a deliberate effort to reopen the criteria conversation. Reopening requires a Champion with genuine EB access. Getting to Decision Criteria before the formal process begins is not optional - it is the qualification work.<\u002Fp>\n    <h2>Decision Criteria across the sales cycle<\u002Fh2>\n    <div class=\"ctable c3\">\n      <div class=\"ct-head\"><div>Stage<\u002Fdiv><div>Criteria focus<\u002Fdiv><div>What good looks like<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Early<\u002Fstrong><\u002Fdiv><div>Introduce evaluation dimensions that reflect your genuine differentiators before the customer has finalized their criteria. Ask what they have evaluated in the past and what mattered most.<\u002Fdiv><div>Customer is using language from your discovery conversations when describing what they need.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Mid<\u002Fstrong><\u002Fdiv><div>Work with your Champion to understand the draft evaluation framework and actively shape it. Review any pre-RFP criteria lists and offer input.<\u002Fdiv><div>Your Champion is advocating for criteria that reflect your differentiators. No unfavorable criteria appear in the framework without a response plan.<\u002Fdiv><\u002Fdiv>\n      <div class=\"ct-row\"><div><strong>Late<\u002Fstrong><\u002Fdiv><div>Confirm criteria are locked in your favor. If new criteria emerge at the approval stage, identify who introduced them and work with your Champion to respond.<\u002Fdiv><div>All formal evaluation criteria favor your solution. EB's business criteria are anchored in your validated M2 outcomes.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"at-edb\" style=\"background-color: rgb(20, 117, 139)\">\n      <div class=\"badge\">At EDB · Decision Criteria<\u002Fdiv>\n      <h4>Decision Criteria at EDB<\u002Fh4>\n      <p>The most common pattern at EDB is late, reactive engagement with Decision Criteria - particularly in formal procurement markets where criteria lock once an RFP is issued. EDB's strongest evaluation differentiators center on PostgreSQL compatibility depth, migration tooling maturity, enterprise support model, and compliance certification coverage. These need to be introduced as evaluation dimensions before the RFP is drafted, not defended after it is issued.<\u002Fp>\n    <\u002Fdiv>\n    <footer class=\"page-foot\"><span>Section 02 · D · Decision Criteria<\u002Fspan><span class=\"pagenum\">06<\u002Fspan><\u002Ffooter>\n  <\u002Fsection>\n\n  <!-- D - DECISION PROCESS -->\n  <section class=\"letter-page\" data-screen-label=\"D - Decision Process\">\n    <header class=\"page-head\"><span class=\"brand\"><img src=\"506b7e83-ee60-478b-917c-aac3fbed873c\" alt=\"EDB\" style=\"height: 60px; width: auto; display: inline-block; vertical-align: middle\"><\u002Fspan><span>Section 02 · Letter 4 of 7<\u002Fspan><\u002Fheader>\n    <div class=\"letter-mark deep\">\n      <div class=\"glyph\">D<\u002Fdiv>\n      <div class=\"letter-meta\">\n        <div class=\"eyebrow\">Letter 04 · Decision Process<\u002Fdiv>\n        <h3 class=\"name\">Decision Process<\u002Fh3>\n        <div class=\"descriptor\">The step-by-step map of how the decision will actually be made.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:56px;\">This letter fails most often in forecasting conversations - not because reps cannot describe a process, but because they describe their <em>hoped-for<\u002Fem> process rather than the one the customer is actually going to run. Understanding the Decision Process is not just about mapping steps - it is about alignment, forecasting accuracy, competitive edge, and risk mitigation.<\u002Fp>\n    <h2>Why Decision Process matters<\u002Fh2>\n    <ul class=\"list\">\n      <li><strong>Alignment:<\u002Fstrong> It ensures your sales process aligns with how your customers want to buy - not how you want to sell.<\u002Fli>\n      <li><strong>Forecasting accuracy:<\u002Fstrong> A clear understanding of the Decision Process improves your ability to predict deal outcomes and commit with confidence.<\u002Fli>\n      <li><strong>Competitive edge:<\u002Fstrong> Knowing the process allows you to influence it and outmaneuver competitors who are navigating blind.<\u002Fli>\n      <li><strong>Risk mitigation:<\u002Fstrong> It helps identify potential roadblocks early in the sales cycle before they become deal-killers.<\u002Fli>\n    <\u002Ful>\n    <h2>Three elements of the Decision Process<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 20px 0 28px; break-inside: avoid;\">\n      <!-- The Process -->\n      <div style=\"padding: 24px 22px; border-radius: 12px; border: 1.5px solid rgba(20,117,139,0.35); background: rgba(20,117,139,0.05); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, #14758B, #84DAED); display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2\"><\u002Fpath><rect x=\"9\" y=\"3\" width=\"6\" height=\"4\" rx=\"1\"><\u002Frect><line x1=\"9\" y1=\"12\" x2=\"15\" y2=\"12\"><\u002Fline><line x1=\"9\" y1=\"16\" x2=\"13\" y2=\"16\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); letter-spacing: -0.01em;\">The Process<\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: var(--fg-2); line-height: 1.55;\">The formal approval steps, procurement requirements, legal review, and committee sign-offs between now and signature.<\u002Fdiv>\n        <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.45; padding-top: 4px; border-top: 1px solid rgba(20,117,139,0.2);\">\n\nWhy it matters: Each unmapped step is an uncontrolled risk. Knowing every step prevents late-stage surprises.<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- The People -->\n      <div style=\"padding: 24px 22px; border-radius: 12px; border: 1.5px solid rgba(20,117,139,0.35); background: rgba(20,117,139,0.05); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, #14758B, #84DAED); display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); letter-spacing: -0.01em;\">The People<\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: var(--fg-2); line-height: 1.55;\">Who owns each step, who has veto authority, and who influences decisions without appearing formally in the process.<\u002Fdiv>\n        <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.45; padding-top: 4px; border-top: 1px solid rgba(20,117,139,0.2);\">\n\nWhy it matters: The informal power chart matters as much as the org chart. Your Champion needs presence in every critical conversation.<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- The Timing -->\n      <div style=\"padding: 24px 22px; border-radius: 12px; border: 1.5px solid rgba(20,117,139,0.35); background: rgba(20,117,139,0.05); display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, #14758B, #84DAED); display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family: var(--font-display); font-weight: 500; font-size: 18px; color: var(--fg-1); letter-spacing: -0.01em;\">The Timing<\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: var(--fg-2); line-height: 1.55;\">Estimated timeframe for each step, dependencies, and external forcing functions - budget cycles, board dates, regulatory deadlines.<\u002Fdiv>\n        <div style=\"font-size: 12.5px; color: var(--fg-3); line-height: 1.45; padding-top: 4px; border-top: 1px solid rgba(20,117,139,0.2);\"><strong style=\"color: #14758B;\">Why it matters:<\u002Fstrong> A close date without a mapped timeline is a guess. Real compelling events create urgency - discovered, not invented.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"key-principle\"><div class=\"kp-label\">Key Principle<\u002Fdiv><p>A Mutual Action Plan shared with the customer - not just an internal document - is the most powerful tool for managing Decision Process. A Go-Live Plan that extends beyond signature sets expectations for implementation and drives adoption.<\u002Fp><\u002Fdiv>\n    <h2>Tools: MAPs and Go-Live Plans<\u002Fh2>\n    <p>A <strong>Mutual Action Plan (MAP)<\u002Fstrong> is a shared document between the seller and the customer that maps every remaining step to close - with named owners and agreed timeframes on both sides. It replaces the internal Sequence of Events with a collaborative artifact the customer has co-signed.<\u002Fp>\n    <p>A <strong>Go-Live Plan<\u002Fstrong> extends the MAP beyond signature into implementation - covering onboarding milestones, M3 Metrics tracking, and the first 90 days of adoption. It demonstrates commitment to the outcome, not just the close, and makes
